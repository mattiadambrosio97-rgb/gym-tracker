<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#09090b" id="themeColor">
<title>Gym Quick</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   THEME SYSTEM — Night (default) + Day
   ══════════════════════════════════════ */
:root {
  --bg: #09090b;
  --bg2: #0f0f12;
  --card: #18181b;
  --card2: #27272a;
  --accent: #6366f1;
  --accent2: #818cf8;
  --accent-bg: rgba(99,102,241,.1);
  --green: #22c55e;
  --green-bg: rgba(34,197,94,.12);
  --orange: #f59e0b;
  --orange-bg: rgba(245,158,11,.12);
  --red: #ef4444;
  --red-bg: rgba(239,68,68,.12);
  --text: #fafafa;
  --text2: #a1a1aa;
  --text3: #71717a;
  --border: #27272a;
  --input-bg: #09090b;
  --shadow: rgba(0,0,0,.3);
  --r: 16px;
  --safe-t: env(safe-area-inset-top, 0px);
  --safe-b: env(safe-area-inset-bottom, 0px);
}

[data-theme="day"] {
  --bg: #f4f4f5;
  --bg2: #e4e4e7;
  --card: #ffffff;
  --card2: #f4f4f5;
  --accent: #4f46e5;
  --accent2: #6366f1;
  --accent-bg: rgba(79,70,229,.08);
  --green: #16a34a;
  --green-bg: rgba(22,163,74,.1);
  --orange: #d97706;
  --orange-bg: rgba(217,119,6,.1);
  --red: #dc2626;
  --red-bg: rgba(220,38,38,.1);
  --text: #18181b;
  --text2: #52525b;
  --text3: #a1a1aa;
  --border: #e4e4e7;
  --input-bg: #f4f4f5;
  --shadow: rgba(0,0,0,.06);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; }
body {
  background:var(--bg); color:var(--text);
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  display:flex; flex-direction:column;
  transition:background .3s, color .3s;
  padding-top:var(--safe-t);
}

/* ── HEADER ── */
header {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 16px; border-bottom:1px solid var(--border); flex-shrink:0;
  background:var(--card); transition:background .3s;
}
.hdr-left { display:flex; align-items:center; gap:8px; }
header h1 { font-size:18px; font-weight:900; letter-spacing:-0.5px; }
header h1 em { font-style:normal; color:var(--accent2); }
.sync-badge {
  width:8px; height:8px; border-radius:50%; background:var(--text3);
  flex-shrink:0; transition:all .3s;
}
.sync-badge.on { background:var(--green); box-shadow:0 0 6px rgba(34,197,94,.5); }

.hdr-right { display:flex; align-items:center; gap:8px; }

/* Theme toggle */
.theme-btn {
  width:36px; height:36px; border-radius:50%;
  border:1px solid var(--border); background:var(--card2);
  color:var(--text2); font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .2s; font-family:inherit;
}
.theme-btn:active { transform:scale(.9); }

/* Profile pills */
.profile-pills {
  display:flex; gap:3px; background:var(--card2); border-radius:22px; padding:3px;
  transition:background .3s;
}
.pill {
  padding:7px 16px; border-radius:20px; border:none;
  background:transparent; color:var(--text3);
  font-size:13px; font-weight:700; cursor:pointer; font-family:inherit;
  transition:all .2s;
}
.pill.on { background:var(--accent); color:#fff; }

/* ── MAIN SCROLL ── */
main {
  flex:1; overflow-y:auto; padding:14px 14px calc(100px + var(--safe-b));
  -webkit-overflow-scrolling:touch;
}

/* ── DATE ── */
.date-bar {
  text-align:center; font-size:12px; color:var(--text3); font-weight:700;
  margin-bottom:14px; text-transform:uppercase; letter-spacing:1.5px;
}

/* ── EMPTY STATE ── */
.empty {
  text-align:center; padding:56px 20px; color:var(--text3);
}
.empty .icon { font-size:52px; margin-bottom:14px; }
.empty p { font-size:15px; line-height:1.6; }

/* ── EXERCISE CARD ── */
.ex-card {
  background:var(--card); border-radius:var(--r); padding:16px;
  margin-bottom:10px; border:1px solid var(--border);
  box-shadow:0 2px 8px var(--shadow);
  transition:background .3s, border-color .3s;
}
.ex-top {
  display:flex; align-items:center; gap:8px; margin-bottom:12px;
}
.ex-name {
  font-size:16px; font-weight:800; background:none; border:none;
  color:var(--text); font-family:inherit; outline:none; flex:1;
  padding:0; min-width:0;
}
.ex-name::placeholder { color:var(--text3); }
.ex-muscle {
  font-size:10px; font-weight:700; padding:3px 8px; border-radius:8px;
  background:var(--accent-bg); color:var(--accent2);
  white-space:nowrap; flex-shrink:0;
}
.ex-del {
  width:30px; height:30px; border-radius:50%; border:1px solid var(--border);
  background:transparent; color:var(--text3); font-size:14px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:all .15s;
}
.ex-del:active { background:var(--red-bg); color:var(--red); border-color:var(--red); }

/* ── SETS ── */
.sets-head {
  display:grid; grid-template-columns:30px 1fr 1fr 30px;
  gap:6px; margin-bottom:4px;
}
.sets-head span {
  font-size:10px; color:var(--text3); font-weight:700; text-transform:uppercase;
  text-align:center; letter-spacing:0.5px;
}
.set-row {
  display:grid; grid-template-columns:30px 1fr 1fr 30px;
  gap:6px; margin-bottom:5px; align-items:center;
}
.set-num {
  width:28px; height:28px; border-radius:50%;
  background:var(--card2); color:var(--text2);
  font-size:12px; font-weight:800;
  display:flex; align-items:center; justify-content:center;
  transition:background .3s;
}
.set-input {
  width:100%; padding:11px 4px; border-radius:10px;
  border:1px solid var(--border); background:var(--input-bg);
  color:var(--text); font-size:18px; font-weight:700;
  text-align:center; font-family:inherit; outline:none;
  transition:all .15s;
}
.set-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-bg); }
.set-del {
  width:28px; height:28px; border-radius:50%; border:none;
  background:transparent; color:var(--text3); font-size:13px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
}
.set-del:active { color:var(--red); }

.add-set {
  width:100%; padding:9px; border-radius:10px;
  border:1px dashed var(--border); background:transparent;
  color:var(--text3); font-size:13px; font-weight:600;
  cursor:pointer; font-family:inherit; margin-top:6px;
  transition:all .15s;
}
.add-set:active { border-color:var(--accent); color:var(--accent2); }

/* ── RPE BAR ── */
.rpe-bar {
  display:flex; gap:3px; margin-top:10px; padding-top:10px;
  border-top:1px solid var(--border); align-items:center;
}
.rpe-bar .rpe-label {
  font-size:11px; color:var(--text3); font-weight:700;
  margin-right:2px; white-space:nowrap;
}
.rpe-btn {
  flex:1; padding:8px 0; border-radius:8px; border:1px solid var(--border);
  background:transparent; color:var(--text3);
  font-size:13px; font-weight:800; cursor:pointer; font-family:inherit;
  transition:all .15s; text-align:center; min-width:0;
}
.rpe-btn.on { border-color:transparent; color:#fff; }
.rpe-btn.rpe-low.on { background:var(--green); }
.rpe-btn.rpe-mid.on { background:var(--orange); }
.rpe-btn.rpe-high.on { background:var(--red); }
.rpe-btn:active { transform:scale(.9); }

/* ── ADD EXERCISE ── */
.add-ex {
  width:100%; padding:16px; border-radius:var(--r);
  border:1px dashed var(--text3); background:transparent;
  color:var(--text2); font-size:15px; font-weight:700;
  cursor:pointer; font-family:inherit; margin-bottom:10px;
  transition:all .15s;
}
.add-ex:active { border-color:var(--accent); color:var(--accent2); }

/* ── VOLUME SUMMARY ── */
.vol-sum {
  text-align:center; padding:10px; font-size:13px; color:var(--text3); font-weight:600;
}
.vol-sum strong { color:var(--accent2); font-size:16px; }

/* ══════════════════════════
   TIMER — full screen overlay
   ══════════════════════════ */
.timer-overlay {
  position:fixed; inset:0; z-index:999;
  background:var(--bg);
  display:none;
  flex-direction:column;
  align-items:center; justify-content:center; gap:28px;
  padding-bottom:40px;
  transition:background .3s;
}
.timer-overlay.show { display:flex; }

.timer-close {
  position:absolute; top:calc(12px + var(--safe-t)); right:16px;
  width:44px; height:44px; border-radius:50%;
  border:1px solid var(--border); background:var(--card);
  color:var(--text); font-size:22px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.timer-label {
  font-size:13px; color:var(--text3); font-weight:700;
  text-transform:uppercase; letter-spacing:2px;
}
.timer-display {
  font-size:min(28vw, 140px); font-weight:900; font-variant-numeric:tabular-nums;
  letter-spacing:-3px; line-height:1;
  transition:color .3s;
}
.timer-display.warn { color:var(--orange); }
.timer-display.done { color:var(--green); animation:pulse 1s infinite; }
@keyframes pulse { 50% { opacity:.3; } }

.timer-presets { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; padding:0 20px; }
.t-preset {
  padding:12px 20px; border-radius:12px;
  border:1px solid var(--border); background:var(--card);
  color:var(--text2); font-size:17px; font-weight:700;
  cursor:pointer; font-family:inherit; transition:all .15s;
  min-width:68px; text-align:center;
}
.t-preset.on { border-color:var(--accent); color:var(--accent2); background:var(--accent-bg); }
.t-preset:active { transform:scale(.93); }

.timer-actions { display:flex; gap:12px; }
.t-btn {
  padding:16px 32px; border-radius:14px; border:none;
  font-size:17px; font-weight:800; cursor:pointer; font-family:inherit;
  transition:all .15s;
}
.t-btn.go { background:var(--accent); color:#fff; min-width:150px; }
.t-btn.go:active { transform:scale(.95); }
.t-btn.rst { background:var(--card); color:var(--text2); border:1px solid var(--border); }

/* ── TIMER FAB ── */
.timer-fab {
  position:fixed; bottom:calc(28px + var(--safe-b)); left:50%; transform:translateX(-50%);
  width:56px; height:56px; border-radius:50%;
  background:var(--accent); color:#fff;
  font-size:24px; border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 20px rgba(99,102,241,.35);
  z-index:100; transition:all .15s;
}
.timer-fab:active { transform:translateX(-50%) scale(.88); }

/* ══════════════════════════
   EXERCISE PICKER
   ══════════════════════════ */
.picker-overlay {
  position:fixed; inset:0; z-index:500;
  background:rgba(0,0,0,.7);
  display:none;
  align-items:flex-end; justify-content:center;
}
.picker-overlay.show { display:flex; }
.picker {
  background:var(--card); border-radius:20px 20px 0 0;
  width:100%; max-width:500px; max-height:80vh;
  padding:20px 16px calc(20px + var(--safe-b));
  overflow-y:auto; transition:background .3s;
}
.picker h2 { font-size:17px; font-weight:800; margin-bottom:12px; }
.picker-close {
  float:right; width:32px; height:32px; border-radius:50%;
  border:1px solid var(--border); background:var(--card2);
  color:var(--text2); font-size:16px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.picker-search {
  width:100%; padding:13px 14px; border-radius:12px;
  border:1px solid var(--border); background:var(--input-bg);
  color:var(--text); font-size:16px; font-family:inherit;
  outline:none; margin-bottom:10px; font-weight:500;
  transition:all .15s;
}
.picker-search:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-bg); }
.picker-muscles {
  display:flex; gap:5px; overflow-x:auto; margin-bottom:10px;
  padding-bottom:4px; -webkit-overflow-scrolling:touch;
}
.m-pill {
  padding:6px 12px; border-radius:14px; border:1px solid var(--border);
  background:transparent; color:var(--text3); font-size:11px;
  font-weight:700; cursor:pointer; font-family:inherit;
  white-space:nowrap; transition:all .15s;
}
.m-pill.on { background:var(--accent); color:#fff; border-color:var(--accent); }
.pick-item {
  padding:13px 14px; border-radius:12px; background:var(--card2);
  margin-bottom:5px; cursor:pointer; font-size:14px; font-weight:600;
  display:flex; justify-content:space-between; align-items:center;
  transition:all .15s;
}
.pick-item:active { background:var(--accent-bg); }
.pick-item .tag {
  font-size:10px; color:var(--accent2); background:var(--accent-bg);
  padding:3px 8px; border-radius:6px; font-weight:700;
}
.pick-custom {
  width:100%; padding:13px; border-radius:12px;
  border:1px dashed var(--border); background:transparent;
  color:var(--text3); font-size:13px; font-weight:600;
  cursor:pointer; font-family:inherit; margin-top:6px;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>
<body>

<header>
  <div class="hdr-left">
    <h1><em>GYM</em> Quick</h1>
    <div class="sync-badge" id="syncBadge"></div>
  </div>
  <div class="hdr-right">
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">&#9788;</button>
    <div class="profile-pills">
      <button class="pill on" onclick="setProfile('mattia')">Mattia</button>
      <button class="pill" onclick="setProfile('michelle')">Michelle</button>
    </div>
  </div>
</header>

<main id="app"></main>

<button class="timer-fab" onclick="openTimer()">&#9201;</button>

<!-- TIMER OVERLAY -->
<div class="timer-overlay" id="timerOv">
  <button class="timer-close" onclick="closeTimer()">&#10005;</button>
  <div class="timer-label">Recupero</div>
  <div class="timer-display" id="tDisp">1:30</div>
  <div class="timer-presets">
    <button class="t-preset" onclick="pickTime(45)">0:45</button>
    <button class="t-preset" onclick="pickTime(60)">1:00</button>
    <button class="t-preset on" onclick="pickTime(90)">1:30</button>
    <button class="t-preset" onclick="pickTime(120)">2:00</button>
    <button class="t-preset" onclick="pickTime(180)">3:00</button>
  </div>
  <div class="timer-actions">
    <button class="t-btn rst" onclick="rstTimer()">Reset</button>
    <button class="t-btn go" id="tToggle" onclick="togTimer()">Avvia</button>
  </div>
</div>

<!-- EXERCISE PICKER -->
<div class="picker-overlay" id="pickerOv" onclick="if(event.target===this)closePicker()">
  <div class="picker">
    <button class="picker-close" onclick="closePicker()">&#10005;</button>
    <h2>Aggiungi esercizio</h2>
    <input class="picker-search" id="pSearch" placeholder="Cerca esercizio..." oninput="filterPick()">
    <div class="picker-muscles" id="pMuscles"></div>
    <div id="pList"></div>
    <button class="pick-custom" onclick="addCustom()">+ Crea personalizzato</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
// ══════════════════════════
//  EXERCISE DB
// ══════════════════════════

const EX_MAP={};EX.forEach(e=>{EX_MAP[e.n]=e.m;});

// ══════════════════════════

// ══════════════════════════
let profile='mattia', mFilter='Tutti';
const today=new Date().toISOString().split('T')[0];
const KEY='gymq_data';

// ── THEME ──
function getTheme(){return localStorage.getItem('gymq_theme')||'night';}
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t==='day'?'day':'');
  document.getElementById('themeColor').content=t==='day'?'#f4f4f5':'#09090b';
  document.getElementById('themeBtn').innerHTML=t==='day'?'&#9790;':'&#9788;';

// ══════════════════════════
//  RENDER
// ══════════════════════════
function render(){
  const{day}=getDay();
  const dayName=new Date().toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'});
  let h=`<div class="date-bar">${dayName}</div>`;

  if(!day.ex.length){
    h+=`<div class="empty"><div class="icon">&#127947;</div><p>Nessun esercizio ancora.<br>Aggiungi il primo!</p></div>`;
  } else {
    day.ex.forEach((ex,ei)=>{
      const muscle=EX_MAP[ex.name]||'';
      let sets='';
      ex.sets.forEach((s,si)=>{
        sets+=`<div class="set-row">
          <div class="set-num">${si+1}</div>
          <input class="set-input" type="number" inputmode="decimal" step="0.5" value="${s.kg||''}" placeholder="kg"
            onchange="upSet(${ei},${si},'kg',this.value)" onfocus="this.select()">
          <input class="set-input" type="number" inputmode="numeric" value="${s.reps||''}" placeholder="rip"
            onchange="upSet(${ei},${si},'reps',this.value)" onfocus="this.select()">
          <button class="set-del" onclick="delSet(${ei},${si})">&#10005;</button>
        </div>`;
      });

      const rpe=parseInt(ex.rpe)||0;
      let rpeBtns='';
      for(let r=1;r<=10;r++){
        const cls=r<=4?'rpe-low':r<=7?'rpe-mid':'rpe-high';
        rpeBtns+=`<button class="rpe-btn ${cls} ${rpe===r?'on':''}" onclick="setRPE(${ei},${r})">${r}</button>`;
      }
      h+=`<div class="ex-card">
        <div class="ex-top">
          <input class="ex-name" value="${ex.name}" onchange="renameEx(${ei},this.value)">
          ${muscle?`<span class="ex-muscle">${muscle}</span>`:''}
          <button class="ex-del" onclick="delEx(${ei})">&#128465;</button>
        </div>
        <div class="sets-head"><span></span><span>KG</span><span>RIP</span><span></span></div>
        ${sets}
        <button class="add-set" onclick="addSet(${ei})">+ Serie</button>
        <div class="rpe-bar">
          <span class="rpe-label">RPE</span>
          ${rpeBtns}
        </div>
      </div>`;
    });
  }

  h+=`<button class="add-ex" onclick="openPicker()">+ Aggiungi esercizio</button>`;

  // Volume
  let vol=0;
  day.ex.forEach(ex=>ex.sets.forEach(s=>{vol+=(parseFloat(s.kg)||0)*(parseInt(s.reps)||0);}));
  if(vol>0) h+=`<div class="vol-sum">Volume totale: <strong>${vol.toLocaleString('it-IT')} kg</strong></div>`;

  document.getElementById('app').innerHTML=h;
}

// ══════════════════════════
//  ACTIONS
// ══════════════════════════
function setProfile(p){
  profile=p;
  document.querySelectorAll('.pill').forEach(b=>b.classList.toggle('on',b.textContent.toLowerCase()===p));
  render();
}

function addEx(name){
  const{data,day}=getDay();
  day.ex.push({name,sets:[{kg:'',reps:''}],rpe:0});
  save(data);closePicker();render();
  setTimeout(()=>{const m=document.getElementById('app');m.scrollTop=m.scrollHeight;},100);
}
function delEx(ei){
  if(!confirm('Rimuovere questo esercizio?'))return;
  const{data,day}=getDay();day.ex.splice(ei,1);save(data);render();
}
function renameEx(ei,v){const{data,day}=getDay();day.ex[ei].name=v;save(data);}

function addSet(ei){
  const{data,day}=getDay();
  const last=day.ex[ei].sets.slice(-1)[0]||{};
  day.ex[ei].sets.push({kg:last.kg||'',reps:last.reps||''});
  save(data);render();
}
function delSet(ei,si){const{data,day}=getDay();day.ex[ei].sets.splice(si,1);save(data);render();}
function upSet(ei,si,f,v){const{data,day}=getDay();day.ex[ei].sets[si][f]=v;save(data);}
function setRPE(ei,v){
  const{data,day}=getDay();
  day.ex[ei].rpe=day.ex[ei].rpe===v?0:v;
  save(data);render();
}

// ══════════════════════════
function openPicker(){
  mFilter='Tutti';
  document.getElementById('pSearch').value='';
  renderMuscles();filterPick();
  document.getElementById('pickerOv').classList.add('show');
}
function closePicker(){document.getElementById('pickerOv').classList.remove('show');}

function renderMuscles(){
  document.getElementById('pMuscles').innerHTML=MUSCLES.map(m=>
    `<button class="m-pill ${m===mFilter?'on':''}" onclick="mFilter='${m}';renderMuscles();filterPick()">${m}</button>`
  ).join('');
}

function filterPick(){
  const q=(document.getElementById('pSearch').value||'').toLowerCase();
  let list=[...EX];
  if(mFilter!=='Tutti')list=list.filter(e=>e.m===mFilter);
  if(q)list=list.filter(e=>e.n.toLowerCase().includes(q)||e.m.toLowerCase().includes(q));

  // Recenti in cima
  const{day}=getDay();
  const recent=day.ex.map(e=>e.name);

  document.getElementById('pList').innerHTML=list.slice(0,30).map(e=>
    `<div class="pick-item" onclick="addEx('${e.n.replace(/'/g,"\\'")}')">
      <span>${e.n}</span><span class="tag">${e.m}</span>
    </div>`
  ).join('');
}

function addCustom(){
  const n=document.getElementById('pSearch').value.trim();
  if(n)addEx(n);
}

// ══════════════════════════
//  TIMER
// ══════════════════════════
let tSec=90,tTarget=90,tInt=null,tOn=false;

function openTimer(){document.getElementById('timerOv').classList.add('show');}
function closeTimer(){document.getElementById('timerOv').classList.remove('show');}

function pickTime(s){
  tTarget=s;tSec=s;tOn=false;clearInterval(tInt);
  document.getElementById('tToggle').textContent='Avvia';
  updTDisp();
  document.querySelectorAll('.t-preset').forEach(b=>{
    const p=b.textContent.split(':');
    b.classList.toggle('on',parseInt(p[0])*60+parseInt(p[1])===s);
  });
}

function togTimer(){tOn?stopT():startT();}
function startT(){
  tOn=true;document.getElementById('tToggle').textContent='Pausa';
  tInt=setInterval(()=>{
    tSec--;updTDisp();
    if(tSec<=0){stopT();tSec=0;updTDisp();
      if(navigator.vibrate)navigator.vibrate([200,100,200,100,200]);
    }
  },1000);
}
function stopT(){tOn=false;clearInterval(tInt);document.getElementById('tToggle').textContent='Avvia';}
function rstTimer(){stopT();tSec=tTarget;updTDisp();}

function updTDisp(){
  const d=document.getElementById('tDisp');
  const m=Math.floor(Math.abs(tSec)/60);
  const s=Math.abs(tSec)%60;
  const sign=tSec<0?'+':'';
  d.textContent=`${sign}${m}:${String(s).padStart(2,'0')}`;
  d.className=tSec<=0?'timer-display done':tSec<=10?'timer-display warn':'timer-display';
}

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#09090b" id="themeColor">
<title>Gym Quick</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#09090b; --card:#18181b; --card2:#27272a;
  --accent:#6366f1; --accent2:#818cf8; --accent-bg:rgba(99,102,241,.1);
  --green:#22c55e; --orange:#f59e0b; --red:#ef4444;
  --text:#fafafa; --text2:#a1a1aa; --text3:#71717a;
  --border:#27272a; --input-bg:#09090b;
  --r:14px; --safe-b:env(safe-area-inset-bottom,0px);
}
[data-theme="day"] {
  --bg:#f4f4f5; --card:#ffffff; --card2:#f4f4f5;
  --accent:#4f46e5; --accent2:#6366f1; --accent-bg:rgba(79,70,229,.08);
  --green:#16a34a; --orange:#d97706; --red:#dc2626;
  --text:#18181b; --text2:#52525b; --text3:#a1a1aa;
  --border:#e4e4e7; --input-bg:#f4f4f5;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;display:flex;flex-direction:column;transition:background .3s,color .3s}

header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--card);flex-shrink:0}
header h1{font-size:18px;font-weight:900}
header h1 em{font-style:normal;color:var(--accent2)}
.sync-badge{width:8px;height:8px;border-radius:50%;background:var(--text3);margin-left:6px;display:inline-block;vertical-align:middle}
.sync-badge.on{background:var(--green);box-shadow:0 0 6px rgba(34,197,94,.5)}
.hdr-right{display:flex;align-items:center;gap:6px}
.theme-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:var(--card2);color:var(--text2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.pills{display:flex;gap:3px;background:var(--card2);border-radius:20px;padding:3px}
.pill{padding:6px 14px;border-radius:18px;border:none;background:transparent;color:var(--text3);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.pill.on{background:var(--accent);color:#fff}

main{flex:1;overflow-y:auto;padding:12px;padding-bottom:calc(90px + var(--safe-b));-webkit-overflow-scrolling:touch}
.date-bar{text-align:center;font-size:11px;color:var(--text3);font-weight:700;margin-bottom:12px;text-transform:uppercase;letter-spacing:1.5px}
.date-input{background:var(--card);border:1px solid var(--border);color:var(--text);font-size:14px;font-weight:700;font-family:inherit;padding:8px 14px;border-radius:10px;outline:none;margin-left:8px}

/* ── TABS ── */
.tabs{display:flex;gap:3px;background:var(--card2);border-radius:10px;padding:3px;margin-bottom:12px}
.tab-btn{flex:1;padding:9px;border-radius:8px;border:none;background:transparent;color:var(--text3);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.tab-btn.on{background:var(--accent);color:#fff}

/* ── HISTORY CARD ── */
.hist-card{background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:10px;border:1px solid var(--border);cursor:pointer}
.hist-card:active{border-color:var(--accent)}
.hist-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hist-date{font-size:16px;font-weight:900}
.hist-day{font-size:12px;color:var(--accent2);font-weight:700;text-transform:uppercase}
.hist-muscles{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.hist-muscle-tag{font-size:11px;font-weight:700;padding:4px 10px;border-radius:8px;background:var(--accent-bg);color:var(--accent2)}
.hist-exs{margin-bottom:10px}
.hist-ex-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border)}
.hist-ex-row:last-child{border-bottom:none}
.hist-ex-name{font-size:13px;font-weight:700;color:var(--text)}
.hist-ex-detail{font-size:12px;color:var(--text2);font-weight:600}
.hist-stats{display:flex;gap:12px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.hist-stat{flex:1;text-align:center}
.hist-stat-val{font-size:18px;font-weight:900;color:var(--accent2)}
.hist-stat-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:700}


/* ── EXERCISE ROW ── */
.ex-card{background:var(--card);border-radius:var(--r);padding:14px;margin-bottom:10px;border:1px solid var(--border)}
.ex-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.ex-select{flex:1;padding:10px 8px;border-radius:10px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-size:14px;font-weight:700;font-family:inherit;outline:none}
.ex-custom{flex:1;padding:10px 12px;border-radius:10px;border:1px solid var(--accent);background:var(--input-bg);color:var(--text);font-size:15px;font-weight:700;font-family:inherit;outline:none;margin-right:4px}
.ex-custom::placeholder{color:var(--text3)}
.ex-del{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ── SETS ── */
.sets-head{display:grid;grid-template-columns:28px 1fr 1fr 56px 38px;gap:5px;margin-bottom:4px}
.sets-head span{font-size:9px;color:var(--text3);font-weight:700;text-transform:uppercase;text-align:center;letter-spacing:.5px}
.set-row{display:grid;grid-template-columns:28px 1fr 1fr 56px 38px;gap:5px;margin-bottom:4px;align-items:center}
.set-num{width:26px;height:26px;border-radius:50%;background:var(--card2);color:var(--text2);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center}
.set-input{width:100%;padding:10px 4px;border-radius:8px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-size:17px;font-weight:700;text-align:center;font-family:inherit;outline:none}
.set-input:focus{border-color:var(--accent)}
.rpe-sel{width:100%;padding:10px 2px;border-radius:8px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-size:14px;font-weight:700;text-align:center;font-family:inherit;outline:none;-webkit-appearance:none;appearance:none}
.set-del{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--card2);color:var(--text2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.add-set{width:100%;padding:8px;border-radius:8px;border:1px dashed var(--border);background:transparent;color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px}
.ex-note{width:100%;margin-top:8px;padding:9px 11px;border-radius:8px;border:1px solid var(--border);background:var(--input-bg);color:var(--text2);font-size:13px;font-family:inherit;outline:none;font-style:italic}
.ex-note:focus{border-color:var(--accent);color:var(--text);font-style:normal}
.ex-note::placeholder{color:var(--text3);font-style:italic}
.hist-note{font-size:11px;color:var(--orange);font-style:italic;padding:4px 0 0 0;line-height:1.3}

/* ── CARDIO ── */
.cardio-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.cardio-field{display:flex;flex-direction:column;gap:4px}
.cardio-label{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.cardio-input{width:100%;padding:12px 8px;border-radius:10px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-size:20px;font-weight:800;text-align:center;font-family:inherit;outline:none}
.cardio-input:focus{border-color:var(--accent)}

/* RPE per serie - dentro il select */

/* ── ADD EXERCISE ── */
.add-ex{width:100%;padding:14px;border-radius:var(--r);border:1px dashed var(--text3);background:transparent;color:var(--text2);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:10px}
.vol-sum{text-align:center;padding:10px;font-size:13px;color:var(--text3);font-weight:600}
.vol-sum strong{color:var(--accent2);font-size:16px}

/* ── TIMER ── */
.timer-overlay{position:fixed;inset:0;z-index:999;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding-bottom:40px}
.timer-overlay.show{display:flex}
.timer-close{position:absolute;top:16px;right:16px;width:44px;height:44px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.timer-label{font-size:12px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:2px}
.timer-display{font-size:min(28vw,140px);font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:-3px;line-height:1}
.timer-display.warn{color:var(--orange)}.timer-display.done{color:var(--green);animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.3}}
.timer-presets{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;padding:0 20px}
.t-preset{padding:12px 20px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;min-width:68px;text-align:center}
.t-preset.on{border-color:var(--accent);color:var(--accent2);background:var(--accent-bg)}
.timer-actions{display:flex;gap:12px}
.t-btn{padding:16px 32px;border-radius:14px;border:none;font-size:17px;font-weight:800;cursor:pointer;font-family:inherit}
.t-btn.go{background:var(--accent);color:#fff;min-width:150px}
.t-btn.rst{background:var(--card);color:var(--text2);border:1px solid var(--border)}
.timer-fab{position:fixed;bottom:calc(28px + var(--safe-b));left:50%;transform:translateX(-50%);width:56px;height:56px;border-radius:50%;background:var(--accent);color:#fff;font-size:24px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(99,102,241,.35);z-index:100}
</style>
</head>
<body>

<header>
  <div><h1><em>GYM</em> Quick <span class="sync-badge" id="syncBadge"></span></h1></div>
  <div class="hdr-right">
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">&#9788;</button>
    <div class="pills">
      <button class="pill on" onclick="setProfile('mattia')">Mattia</button>
      <button class="pill" onclick="setProfile('michelle')">Michelle</button>
    </div>
  </div>
</header>

<main id="app"></main>

<button class="timer-fab" onclick="openTimer()">&#9201;</button>

<div class="timer-overlay" id="timerOv">
  <button class="timer-close" onclick="closeTimer()">&#10005;</button>
  <div class="timer-label">Recupero</div>
  <div class="timer-display" id="tDisp">1:30</div>
  <div class="timer-presets">
    <button class="t-preset" onclick="pickTime(45)">0:45</button>
    <button class="t-preset" onclick="pickTime(60)">1:00</button>
    <button class="t-preset on" onclick="pickTime(90)">1:30</button>
    <button class="t-preset" onclick="pickTime(120)">2:00</button>
    <button class="t-preset" onclick="pickTime(180)">3:00</button>
  </div>
  <div class="timer-actions">
    <button class="t-btn rst" onclick="rstTimer()">Reset</button>
    <button class="t-btn go" id="tToggle" onclick="togTimer()">Avvia</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
const EX_GROUPS = {
  'Petto': ['Panca Piana Bilanciere','Panca Piana Manubri','Chest Incline','Croci Cavi','Croci Manubri Piana','Croci Manubri Inclinata','Chest Press','Pectoral Machine','Dip (Petto)','Push Up','Panca Piana Smith'],
  'Schiena': ['Trazioni Presa Larga','Trazioni Presa Stretta','Trazioni Supine','Lat Machine Avanti','Lat Machine Presa Stretta','Pulley Basso','Pulley Alto','Rematore Bilanciere','Rematore Manubrio','Rematore T-Bar','Stacco da Terra','Stacco Rumeno','Low Row Machine','Face Pull','Pullover Cavo','Vertical Row Machine','Hyperextension'],
  'Spalle': ['Military Press Bilanciere','Shoulder Press Manubri','Shoulder Press Machine','Arnold Press','Alzate Laterali Manubri','Alzate Laterali Cavo','Alzate Laterali Macchina','Alzate Frontali','Alzate Posteriori Manubri','Reverse Pec Deck','Tirate al Mento','Lento Avanti Smith','Shrug Manubri','Shrug Bilanciere'],
  'Bicipiti': ['Curl Bilanciere','Curl Bilanciere EZ','Curl Manubri Alternati','Curl Manubri Seduto','Hammer Curl','Curl Concentrato','Curl Panca Scott','Curl Cavo Basso'],
  'Tricipiti': ['French Press Bilanciere','French Press Manubri','Push Down Cavo','Push Down Corda','Kick Back Manubrio','Dip (Tricipiti)','Dip Machine','Estensioni Sopra la Testa Cavo','Panca Presa Stretta'],
  'Gambe': ['Squat Bilanciere','Multi Power','Front Squat','Squat Goblet','Leg Press','Leg Press 45 gradi','Hack Squat','Leg Extension','Affondi Manubri','Affondi Bilanciere','Squat Bulgaro','Step Up','Sissy Squat','Leg Curl Sdraiato','Leg Curl Seduto','Stacco Rumeno Manubri','Stacco Rumeno Bilanciere','Good Morning','Nordic Curl'],
  'Glutei': ['Hip Thrust Bilanciere','Hip Thrust Smith','Glute Bridge','Gluteus Machine','Abductor Machine','Adductor Machine','Kick Back Cavo Glutei','Sumo Squat'],
  'Polpacci': ['Calf Raise in Piedi','Calf Raise Seduto','Calf Raise Smith','Calf Raise Leg Press'],
  'Core': ['Crunch Macchina','Crunch ai Cavi','Crunch Inverso','Plank','Side Plank','Russian Twist','Leg Raise Sospeso','Ab Wheel','Woodchop Cavo','Pallof Press'],
  'Cardio': ['Tapis Roulant','Step','Ellittica','Cyclette','Vogatore'],
};

const ALL_EX=[];Object.values(EX_GROUPS).forEach(exs=>exs.forEach(e=>ALL_EX.push(e)));
const CARDIO_EX=EX_GROUPS['Cardio']||[];

// Options per il select
function buildOptions(selected){
  let h=selected?'':`<option value="">-- Scegli esercizio --</option>`;
  Object.entries(EX_GROUPS).forEach(([group,exs])=>{
    h+=`<optgroup label="${group}">`;
    exs.forEach(e=>{h+=`<option value="${e}" ${e===selected?'selected':''}>${e}</option>`;});
    h+='</optgroup>';
  });
  h+=`<option value="__custom__">Altro (scrivi il nome)...</option>`;
  return h;
}

let profile='mattia';
let currentDate=new Date().toISOString().split('T')[0];
let currentTab='workout'; // 'workout' o 'history'
const KEY='gymq_data';

// Theme
function getTheme(){return localStorage.getItem('gymq_theme')||'night';}
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t==='day'?'day':'');
  document.getElementById('themeColor').content=t==='day'?'#f4f4f5':'#09090b';
  document.getElementById('themeBtn').innerHTML=t==='day'?'&#9790;':'&#9788;';
  localStorage.setItem('gymq_theme',t);
}
function toggleTheme(){applyTheme(getTheme()==='day'?'night':'day');}
applyTheme(getTheme());

// Firebase
firebase.initializeApp({
  apiKey:"AIzaSyAY9_Vj4qmoYtH335dKncpMIb9LSJwYMeg",
  authDomain:"agenda-f3298.firebaseapp.com",
  databaseURL:"https://agenda-f3298-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"agenda-f3298",
  storageBucket:"agenda-f3298.firebasestorage.app",
  messagingSenderId:"1064348670898",
  appId:"1:1064348670898:web:3c522b8d9db04dd348a2ab"
});
const fbdb=firebase.database();

function toArr(v){return Array.isArray(v)?v:Object.values(v||{});}
function normalizeData(d){
  ['mattia','michelle'].forEach(p=>{
    if(!d[p]) return;
    Object.keys(d[p]).forEach(date=>{
      const day=d[p][date];
      if(!day) return;
      day.ex=toArr(day.ex);
      day.ex.forEach(ex=>{if(ex) ex.sets=toArr(ex.sets);});
    });
  });
  return d;
}
function load(){try{return normalizeData(JSON.parse(localStorage.getItem(KEY))||def());}catch(e){return def();}}
function def(){return{mattia:{},michelle:{},_ts:0};}
function save(d){d._ts=Date.now();localStorage.setItem(KEY,JSON.stringify(d));syncUp();}
function getDay(){
  const d=load();
  if(!d[profile]) d[profile]={};
  if(!d[profile][currentDate]) d[profile][currentDate]={ex:[]};
  return{data:d,day:d[profile][currentDate]};
}

let sTo=null;
function syncUp(){clearTimeout(sTo);sTo=setTimeout(()=>{
  const b=document.getElementById('syncBadge');b.style.background='var(--orange)';
  fbdb.ref('gym-quick').set(load()).then(()=>{b.className='sync-badge on';b.style.background='';}).catch(()=>{b.style.background='var(--red)';});
},600);}
fbdb.ref('.info/connected').on('value',s=>{document.getElementById('syncBadge').className=s.val()?'sync-badge on':'sync-badge';});
fbdb.ref('gym-quick').on('value',snap=>{
  const r=snap.val();if(!r)return;const l=load();
  if(r._ts>(l._ts||0)){localStorage.setItem(KEY,JSON.stringify(r));render();}
});

// ══════════════════════════
//  RENDER
// ══════════════════════════
function switchTab(t){
  if(t==='workout') currentDate=new Date().toISOString().split('T')[0];
  currentTab=t;render();
}
function changeDate(d){currentDate=d;render();}
function deleteSession(date){
  const d=load();
  if(d[profile]) delete d[profile][date];
  save(d);render();
}

function render(){
  let h='';

  // Tabs — Storico prima
  h+=`<div class="tabs">
    <button class="tab-btn ${currentTab==='history'?'on':''}" onclick="switchTab('history')">Storico</button>
    <button class="tab-btn ${currentTab==='workout'?'on':''}" onclick="switchTab('workout')">Allenamento</button>
  </div>`;

  if(currentTab==='history'){
    h+=renderHistory();
    document.getElementById('app').innerHTML=h;
    return;
  }

  // Date picker
  h+=`<div class="date-bar">
    <input class="date-input" type="date" value="${currentDate}" onchange="changeDate(this.value)">
  </div>`;

  const{day}=getDay();

  if(!day.ex.length){
    h+=`<div style="text-align:center;padding:50px 20px;color:var(--text3)">
      <div style="font-size:48px;margin-bottom:12px">&#127947;</div>
      <p style="font-size:15px">Nessun esercizio.<br>Tocca + per aggiungere!</p>
    </div>`;
  }

  day.ex.forEach((ex,ei)=>{
    let sets='';
    ex.sets.forEach((s,si)=>{
      let rpeOpts='<option value="">-</option>';
      for(let r=1;r<=10;r++) rpeOpts+=`<option value="${r}" ${s.rpe==r?'selected':''}>${r}</option>`;
      sets+=`<div class="set-row">
        <div class="set-num">${si+1}</div>
        <input class="set-input" type="number" inputmode="decimal" step="0.5" value="${s.kg||''}" placeholder="kg" onchange="upSet(${ei},${si},'kg',this.value)" onfocus="this.select()">
        <input class="set-input" type="number" inputmode="numeric" value="${s.reps||''}" placeholder="rip" onchange="upSet(${ei},${si},'reps',this.value)" onfocus="this.select()">
        <select class="rpe-sel" onchange="upSet(${ei},${si},'rpe',this.value)">${rpeOpts}</select>
        <button class="set-del" onclick="delSet(${ei},${si})">&#10005;</button>
      </div>`;
    });

    // Se l'esercizio non e nella lista, mostra input testo
    const isCustom = ex.name && !ALL_EX.includes(ex.name);
    const exField = isCustom
      ? `<input class="ex-custom" value="${ex.name}" placeholder="Nome esercizio" onchange="changeEx(${ei},this.value)">
         <button class="ex-del" onclick="resetExName(${ei})" style="font-size:11px;width:auto;padding:0 8px;border-radius:8px">Lista</button>`
      : `<select class="ex-select" onchange="changeEx(${ei},this.value)">${buildOptions(ex.name)}</select>`;

    const isCardio = CARDIO_EX.includes(ex.name);
    const noteField = `<input class="ex-note" type="text" value="${esc(ex.note)}" placeholder="Note (es. polso dolorante, attrezzo occupato...)" onchange="upNote(${ei},this.value)">`;

    if(isCardio){
      h+=`<div class="ex-card">
        <div class="ex-top">
          ${exField}
          <button class="ex-del" onclick="delEx(${ei})">&#128465;</button>
        </div>
        <div class="cardio-row">
          <div class="cardio-field">
            <span class="cardio-label">Minuti</span>
            <input class="cardio-input" type="number" inputmode="numeric" value="${ex.minuti||''}" placeholder="0" onchange="upCardio(${ei},'minuti',this.value)">
          </div>
          <div class="cardio-field">
            <span class="cardio-label">Calorie</span>
            <input class="cardio-input" type="number" inputmode="numeric" value="${ex.calorie||''}" placeholder="0" onchange="upCardio(${ei},'calorie',this.value)">
          </div>
        </div>
        ${noteField}
      </div>`;
    } else {
      h+=`<div class="ex-card">
        <div class="ex-top">
          ${exField}
          <button class="ex-del" onclick="delEx(${ei})">&#128465;</button>
        </div>
        <div class="sets-head"><span></span><span>KG</span><span>RIP</span><span>RPE</span><span></span></div>
        ${sets}
        <button class="add-set" onclick="addSet(${ei})">+ Serie</button>
        ${noteField}
      </div>`;
    }
  });

  h+=`<button class="add-ex" onclick="addEx()">+ Aggiungi esercizio</button>`;

  let vol=0;
  day.ex.forEach(ex=>{if(ex.sets)ex.sets.forEach(s=>{vol+=(parseFloat(s.kg)||0)*(parseInt(s.reps)||0);});});
  if(vol>0) h+=`<div class="vol-sum">Volume totale: <strong>${vol.toLocaleString('it-IT')} kg</strong></div>`;


  document.getElementById('app').innerHTML=h;
}

function renderHistory(){
  const data=load();
  const pdata=data[profile]||{};
  const dates=Object.keys(pdata).filter(k=>k.match(/^\d{4}-\d{2}-\d{2}$/)).sort().reverse();
  if(!dates.length) return `<div style="text-align:center;padding:50px 20px;color:var(--text3)">
    <div style="font-size:48px;margin-bottom:12px">&#128203;</div>
    <p style="font-size:15px">Nessuna sessione registrata.<br>Vai su Allenamento per iniziare!</p>
  </div>`;

  // Mappa esercizio -> gruppo muscolare
  const exToMuscle={};
  Object.entries(EX_GROUPS).forEach(([group,exs])=>{exs.forEach(e=>{exToMuscle[e]=group;});});

  let h='';
  dates.forEach(d=>{
    const session=pdata[d];
    if(!session.ex||!session.ex.length) return;

    const dateObj=new Date(d+'T00:00:00');
    const dayName=dateObj.toLocaleDateString('it-IT',{weekday:'long'});
    const dateLabel=dateObj.toLocaleDateString('it-IT',{day:'numeric',month:'long',year:'numeric'});

    // Gruppi muscolari allenati (unici)
    const muscles=new Set();
    session.ex.forEach(ex=>{
      const m=exToMuscle[ex.name];
      if(m) muscles.add(m);
    });

    // Dettaglio esercizi
    let exRows='';
    let totalVol=0, totalSets=0, totalCardioMin=0;
    session.ex.forEach(ex=>{
      const isCardio=CARDIO_EX.includes(ex.name);
      const noteHtml=ex.note?`<div class="hist-note">&#9888; ${esc(ex.note)}</div>`:'';
      if(isCardio){
        const min=parseInt(ex.minuti)||0;
        const cal=parseInt(ex.calorie)||0;
        totalCardioMin+=min;
        exRows+=`<div class="hist-ex-row">
          <span class="hist-ex-name">${ex.name||'?'}</span>
          <span class="hist-ex-detail">${min}min${cal?' / '+cal+'kcal':''}</span>
        </div>${noteHtml}`;
      } else if(ex.sets){
        const workSets=ex.sets.filter(s=>s.kg||s.reps);
        const numSets=workSets.length;
        totalSets+=numSets;
        let maxKg=0;
        workSets.forEach(s=>{
          const kg=parseFloat(s.kg)||0;
          const reps=parseInt(s.reps)||0;
          totalVol+=kg*reps;
          if(kg>maxKg)maxKg=kg;
        });
        const summary=numSets>0?numSets+'x'+(workSets[0].reps||'?')+(maxKg?' @ '+maxKg+'kg':''):'';
        exRows+=`<div class="hist-ex-row">
          <span class="hist-ex-name">${ex.name||'?'}</span>
          <span class="hist-ex-detail">${summary}</span>
        </div>${noteHtml}`;
      }
    });

    // Muscle tags
    const muscleTags=[...muscles].map(m=>`<span class="hist-muscle-tag">${m}</span>`).join('');

    h+=`<div class="hist-card" onclick="currentDate='${d}';currentTab='workout';render()">
      <div class="hist-top">
        <div><div class="hist-date">${dateLabel}</div><div class="hist-day">${dayName}</div></div>
        <button class="ex-del" onclick="event.stopPropagation();if(confirm('Elimina sessione del ${dateLabel}?'))deleteSession('${d}')" style="color:var(--red);border-color:var(--red)">&#128465;</button>
      </div>
      <div class="hist-muscles">${muscleTags}</div>
      <div class="hist-exs">${exRows}</div>
      <div class="hist-stats">
        ${totalVol>0?`<div class="hist-stat"><div class="hist-stat-val">${(totalVol/1000).toFixed(1)}t</div><div class="hist-stat-label">Volume</div></div>`:''}
        ${totalSets>0?`<div class="hist-stat"><div class="hist-stat-val">${totalSets}</div><div class="hist-stat-label">Serie</div></div>`:''}
        <div class="hist-stat"><div class="hist-stat-val">${session.ex.length}</div><div class="hist-stat-label">Esercizi</div></div>
        ${totalCardioMin>0?`<div class="hist-stat"><div class="hist-stat-val">${totalCardioMin}'</div><div class="hist-stat-label">Cardio</div></div>`:''}
      </div>
    </div>`;
  });
  return h;
}


// ══════════════════════════
//  ACTIONS
// ══════════════════════════
function setProfile(p){
  profile=p;
  document.querySelectorAll('.pill').forEach(b=>b.classList.toggle('on',b.textContent.toLowerCase()===p));
  render();
}

function addEx(){
  const{data,day}=getDay();
  day.ex.push({name:'',sets:[{kg:'',reps:''}],rpe:0});
  save(data);render();
  setTimeout(()=>{const m=document.getElementById('app');m.scrollTop=m.scrollHeight;},50);
}

function changeEx(ei,name){
  const{data,day}=getDay();
  if(name==='__custom__'){
    const custom=prompt('Nome esercizio:');
    if(!custom){render();return;}
    day.ex[ei].name=custom.trim();
  } else {
    day.ex[ei].name=name;
  }
  save(data);render();
}

function resetExName(ei){
  const{data,day}=getDay();
  day.ex[ei].name='';
  save(data);render();
}

function delEx(ei){
  const{data,day}=getDay();day.ex.splice(ei,1);save(data);render();
}

function addSet(ei){
  const{data,day}=getDay();
  const last=day.ex[ei].sets.slice(-1)[0]||{};
  day.ex[ei].sets.push({kg:last.kg||'',reps:last.reps||''});
  save(data);render();
}
function delSet(ei,si){const{data,day}=getDay();day.ex[ei].sets.splice(si,1);save(data);render();}
function upSet(ei,si,f,v){const{data,day}=getDay();day.ex[ei].sets[si][f]=v;save(data);}
function upCardio(ei,field,v){
  const{data,day}=getDay();
  day.ex[ei][field]=v;
  save(data);
}
function upNote(ei,v){const{data,day}=getDay();day.ex[ei].note=v;save(data);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
// RPE ora e per serie, gestito da upSet()

// ══════════════════════════
//  TIMER
// ══════════════════════════
let tSec=90,tTarget=90,tInt=null,tOn=false;
function openTimer(){document.getElementById('timerOv').classList.add('show');}
function closeTimer(){document.getElementById('timerOv').classList.remove('show');}
function pickTime(s){
  tTarget=s;tSec=s;tOn=false;clearInterval(tInt);
  document.getElementById('tToggle').textContent='Avvia';updTDisp();
  document.querySelectorAll('.t-preset').forEach(b=>{const p=b.textContent.split(':');b.classList.toggle('on',parseInt(p[0])*60+parseInt(p[1])===s);});
}
function togTimer(){tOn?stopT():startT();}
function startT(){
  tOn=true;document.getElementById('tToggle').textContent='Pausa';
  tInt=setInterval(()=>{tSec--;updTDisp();if(tSec<=0){stopT();tSec=0;updTDisp();if(navigator.vibrate)navigator.vibrate([200,100,200,100,200]);}},1000);
}
function stopT(){tOn=false;clearInterval(tInt);document.getElementById('tToggle').textContent='Avvia';}
function rstTimer(){stopT();tSec=tTarget;updTDisp();}
function updTDisp(){
  const d=document.getElementById('tDisp');const m=Math.floor(Math.abs(tSec)/60);const s=Math.abs(tSec)%60;
  d.textContent=`${tSec<0?'+':''}${m}:${String(s).padStart(2,'0')}`;
  d.className=tSec<=0?'timer-display done':tSec<=10?'timer-display warn':'timer-display';
}

render();
</script>

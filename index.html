<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0c0f1a">
<meta name="description" content="Gym Tracker - Mattia & Michelle">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>Gym Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0f1a;
  --bg-grad: linear-gradient(145deg, #0c0f1a 0%, #111827 50%, #0f172a 100%);
  --surface: rgba(30,41,59,.65);
  --surface-solid: #1e293b;
  --surface2: rgba(51,65,85,.5);
  --surface3: rgba(71,85,105,.4);
  --accent: #6366f1;
  --accent2: #818cf8;
  --accent-dim: rgba(99,102,241,.12);
  --accent-glow: rgba(99,102,241,.35);
  --accent-grad: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%);
  --green: #34d399;
  --green-dim: rgba(52,211,153,.12);
  --green-grad: linear-gradient(135deg, #10b981, #34d399);
  --red: #f87171;
  --red-dim: rgba(248,113,113,.12);
  --orange: #fbbf24;
  --orange-grad: linear-gradient(135deg, #f59e0b, #fbbf24);
  --purple: #c084fc;
  --cyan: #22d3ee;
  --cyan-grad: linear-gradient(135deg, #06b6d4, #22d3ee);
  --text: #f1f5f9;
  --text2: #94a3b8;
  --text3: #64748b;
  --border: rgba(148,163,184,.12);
  --border-glow: rgba(99,102,241,.2);
  --glass: rgba(30,41,59,.45);
  --glass-border: rgba(148,163,184,.08);
  --radius: 20px;
  --radius-sm: 12px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; overflow:hidden; }
body {
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg); background-image:var(--bg-grad);
  background-attachment:fixed;
  color:var(--text); font-size:16px; line-height:1.5;
  padding-top:var(--safe-top); padding-bottom:var(--safe-bot);
  display:flex; flex-direction:column;
}
/* Ambient glow blobs */
body::before, body::after {
  content:''; position:fixed; border-radius:50%; pointer-events:none; z-index:0;
  filter:blur(80px); opacity:.15;
}
body::before { width:300px; height:300px; background:#6366f1; top:-60px; right:-60px; }
body::after { width:250px; height:250px; background:#8b5cf6; bottom:10%; left:-40px; }

/* ── PIN LOCK ── */
.pin-overlay {
  position:fixed; inset:0; z-index:9999;
  background:var(--bg); background-image:var(--bg-grad);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:28px;
}
.pin-overlay.hidden { display:none; }
.pin-overlay h1 {
  font-size:36px; font-weight:800; letter-spacing:-1px;
}
.pin-overlay h1 span {
  background:var(--accent-grad); -webkit-background-clip:text;
  -webkit-text-fill-color:transparent; background-clip:text;
}
.pin-sub { color:var(--text3); font-size:14px; letter-spacing:1px; text-transform:uppercase; }
.pin-input {
  width:220px; padding:18px; font-size:30px;
  text-align:center; letter-spacing:12px;
  background:var(--glass); border:2px solid var(--glass-border);
  border-radius:var(--radius); color:var(--text);
  outline:none; font-family:inherit;
  backdrop-filter:blur(20px);
}
.pin-input:focus {
  border-color:var(--accent);
  box-shadow:0 0 20px var(--accent-glow), 0 0 0 3px var(--accent-dim);
}
.pin-error { color:var(--red); font-size:14px; min-height:20px; font-weight:700; }

/* ── HEADER ── */
.hdr {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 16px;
  background:var(--glass); backdrop-filter:blur(24px) saturate(1.4);
  border-bottom:1px solid var(--glass-border);
  flex-shrink:0; position:relative; z-index:10;
}
.hdr-left { display:flex; align-items:center; gap:10px; }
.hdr h1 { font-size:18px; font-weight:800; letter-spacing:-0.3px; }
.hdr h1 span {
  background:var(--accent-grad); -webkit-background-clip:text;
  -webkit-text-fill-color:transparent; background-clip:text;
}
.sync-dot {
  width:8px; height:8px; border-radius:50%;
  background:var(--text3); flex-shrink:0;
  box-shadow:0 0 6px transparent; transition:all .3s;
}
.sync-dot.on { background:var(--green); box-shadow:0 0 8px rgba(52,211,153,.5); }
.sync-dot.syncing { background:var(--orange); animation:glow-pulse .8s infinite; }
@keyframes glow-pulse { 50%{opacity:.3; box-shadow:0 0 12px rgba(251,191,36,.6)} }
@keyframes pulse { 50%{opacity:.3} }

.profile-switch {
  display:flex; gap:3px;
  background:var(--glass); backdrop-filter:blur(12px);
  border-radius:24px; padding:3px;
  border:1px solid var(--glass-border);
}
.profile-btn {
  padding:8px 18px; border-radius:22px; border:none;
  background:transparent; color:var(--text3);
  font-size:13px; font-weight:700; cursor:pointer;
  font-family:inherit; transition:all .3s;
}
.profile-btn.active {
  background:var(--accent-grad); color:#fff;
  box-shadow:0 4px 16px var(--accent-glow);
}

/* ── TABS ── */
.tabs {
  display:flex;
  background:var(--glass); backdrop-filter:blur(16px);
  border-bottom:1px solid var(--glass-border);
  flex-shrink:0; position:relative; z-index:10;
}
.tab {
  flex:1; padding:13px 8px; border:none;
  background:transparent; color:var(--text3);
  font-size:12px; font-weight:700; cursor:pointer;
  font-family:inherit; border-bottom:2px solid transparent;
  white-space:nowrap; transition:all .25s;
  text-transform:uppercase; letter-spacing:1px;
}
.tab.active {
  color:var(--accent2);
  border-image:var(--accent-grad) 1;
}

/* ── MAIN ── */
.main {
  flex:1; overflow-y:auto; padding:16px;
  -webkit-overflow-scrolling:touch;
  padding-bottom:80px; position:relative; z-index:1;
}

/* ── GLASS CARD (base for most cards) ── */
.glass-card {
  background:var(--glass); backdrop-filter:blur(16px) saturate(1.2);
  border-radius:var(--radius); padding:18px;
  border:1px solid var(--glass-border);
  box-shadow:0 4px 24px rgba(0,0,0,.2), inset 0 1px 0 rgba(255,255,255,.03);
  margin-bottom:14px; transition:all .2s;
}

/* ── WEEK NAV ── */
.week-nav {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:14px;
}
.week-nav button {
  background:var(--glass); backdrop-filter:blur(12px);
  border:1px solid var(--glass-border);
  color:var(--text); width:40px; height:40px; border-radius:50%;
  font-size:20px; cursor:pointer; font-family:inherit;
  transition:all .2s;
  box-shadow:0 2px 8px rgba(0,0,0,.2);
}
.week-nav button:active {
  background:var(--accent-dim); border-color:var(--accent);
  box-shadow:0 0 12px var(--accent-glow);
}
.week-label { font-size:14px; color:var(--text2); font-weight:600; }

/* ── DAY SELECTOR ── */
.day-selector { display:flex; gap:10px; margin-bottom:18px; }
.day-btn {
  flex:1; padding:14px 6px; border-radius:var(--radius-sm);
  border:1px solid var(--glass-border); background:var(--glass);
  backdrop-filter:blur(12px);
  color:var(--text2); font-size:14px; font-weight:700;
  cursor:pointer; font-family:inherit; text-align:center;
  transition:all .25s;
  box-shadow:0 2px 8px rgba(0,0,0,.15);
}
.day-btn.active {
  border-color:var(--accent); color:#fff;
  background:var(--accent-dim);
  box-shadow:0 0 20px var(--accent-glow), 0 4px 16px rgba(0,0,0,.2);
}
.day-btn .day-label { display:block; font-size:11px; color:var(--text3); margin-top:4px; font-weight:500; }
.day-btn.active .day-label { color:var(--accent2); }

/* ── EXERCISE CARD ── */
.exercise-card {
  background:var(--glass); backdrop-filter:blur(16px) saturate(1.2);
  border-radius:var(--radius); padding:18px; margin-bottom:14px;
  border:1px solid var(--glass-border);
  box-shadow:0 4px 24px rgba(0,0,0,.2), inset 0 1px 0 rgba(255,255,255,.03);
  transition:all .2s;
}
.exercise-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:14px;
}
.exercise-name {
  font-size:17px; font-weight:700; flex:1;
  background:transparent; border:none; color:var(--text);
  font-family:inherit; outline:none; padding:0;
}
.exercise-name::placeholder { color:var(--text3); }
.exercise-muscle {
  font-size:11px; font-weight:700;
  padding:3px 10px; border-radius:12px;
  background:var(--accent-dim); color:var(--accent2);
  margin-left:8px; white-space:nowrap;
  border:1px solid rgba(99,102,241,.15);
}
.exercise-actions { display:flex; gap:6px; }
.icon-btn {
  width:34px; height:34px; border-radius:50%;
  border:1px solid var(--glass-border); background:var(--glass);
  backdrop-filter:blur(8px);
  color:var(--text2); font-size:15px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-family:inherit; transition:all .2s;
}
.icon-btn:active { transform:scale(.88); background:var(--surface2); }
.icon-btn.danger:active { background:rgba(248,113,113,.25); color:var(--red); border-color:rgba(248,113,113,.3); }

/* ── SETS TABLE ── */
.sets-table { width:100%; border-collapse:collapse; }
.sets-table th {
  font-size:10px; color:var(--text3); font-weight:700;
  text-transform:uppercase; padding:6px;
  text-align:center; letter-spacing:1px;
}
.sets-table td { padding:4px; text-align:center; }
.set-row { transition:all .15s; }
.set-row.warmup { opacity:.5; }
.set-input {
  width:100%; padding:10px 4px; border-radius:10px;
  border:1px solid var(--glass-border);
  background:rgba(15,23,42,.6);
  color:var(--text); font-size:16px; text-align:center;
  font-family:inherit; outline:none; font-weight:600;
  transition:all .2s;
}
.set-input:focus {
  border-color:var(--accent);
  box-shadow:0 0 12px var(--accent-glow);
  background:rgba(15,23,42,.9);
}
.set-input.small { max-width:58px; }
.set-num {
  width:28px; height:28px; border-radius:50%;
  font-size:12px; font-weight:800;
  display:inline-flex; align-items:center; justify-content:center;
  background:var(--accent-dim); color:var(--accent2);
  border:1px solid rgba(99,102,241,.15);
}
.set-num.warmup {
  background:linear-gradient(135deg, #f59e0b, #fbbf24);
  color:#000; font-size:10px; border:none;
  box-shadow:0 2px 8px rgba(245,158,11,.3);
}

.rpe-select {
  padding:10px 4px; border-radius:10px;
  border:1px solid var(--glass-border);
  background:rgba(15,23,42,.6);
  color:var(--text); font-size:15px; text-align:center;
  font-family:inherit; outline:none; width:100%; font-weight:600;
  -webkit-appearance:none; appearance:none;
}
.rpe-select:focus { border-color:var(--accent); box-shadow:0 0 12px var(--accent-glow); }

.add-set-row { display:flex; gap:8px; margin-top:12px; }
.add-set-btn {
  flex:1; padding:10px; border-radius:10px;
  border:1px dashed rgba(148,163,184,.2); background:transparent;
  color:var(--text3); font-size:13px; font-weight:600;
  cursor:pointer; font-family:inherit; transition:all .2s;
}
.add-set-btn:active {
  border-color:var(--accent); color:var(--accent2);
  background:var(--accent-dim);
}

.prev-data {
  margin-top:12px; padding:10px 14px;
  background:rgba(15,23,42,.5); border-radius:10px;
  border:1px solid var(--glass-border);
  font-size:12px; color:var(--text3); display:none;
}
.prev-data.show { display:block; }
.prev-data strong { color:var(--text2); }

/* ── ADD EXERCISE BTN ── */
.add-exercise-btn {
  width:100%; padding:16px; border-radius:var(--radius);
  border:1px dashed rgba(148,163,184,.15); background:var(--glass);
  backdrop-filter:blur(8px);
  color:var(--text3); font-size:15px; font-weight:700;
  cursor:pointer; font-family:inherit; margin-bottom:14px;
  transition:all .25s;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}
.add-exercise-btn:active {
  border-color:var(--accent); color:var(--accent2);
  background:var(--accent-dim);
  box-shadow:0 0 16px var(--accent-glow);
}
.add-exercise-btn.accent {
  border:1px solid rgba(99,102,241,.3); color:var(--accent2);
  background:var(--accent-dim);
}

/* ── TIMER BAR ── */
.timer-bar {
  position:fixed; bottom:0; left:0; right:0;
  background:var(--glass); backdrop-filter:blur(24px) saturate(1.4);
  border-top:1px solid var(--glass-border);
  padding:14px 16px calc(14px + var(--safe-bot));
  display:flex; align-items:center; gap:14px;
  z-index:100; transform:translateY(100%);
  transition:transform .3s ease;
  box-shadow:0 -8px 32px rgba(0,0,0,.3);
}
.timer-bar.show { transform:translateY(0); }
.timer-display {
  font-size:38px; font-weight:800; font-variant-numeric:tabular-nums;
  min-width:95px; text-align:center; letter-spacing:-1px;
  text-shadow:0 0 20px rgba(241,245,249,.1);
}
.timer-display.warning { color:var(--orange); text-shadow:0 0 20px rgba(251,191,36,.3); }
.timer-display.ready { color:var(--green); text-shadow:0 0 20px rgba(52,211,153,.4); animation:pulse 1s infinite; }
.timer-presets { display:flex; gap:6px; }
.timer-preset {
  padding:8px 14px; border-radius:10px;
  border:1px solid var(--glass-border); background:var(--glass);
  color:var(--text2); font-size:13px; font-weight:700;
  cursor:pointer; font-family:inherit; transition:all .2s;
}
.timer-preset.active {
  border-color:var(--accent); color:var(--accent2);
  background:var(--accent-dim);
  box-shadow:0 0 8px var(--accent-glow);
}
.timer-controls { display:flex; gap:8px; flex:1; margin-top:8px; }
.timer-btn {
  padding:11px 18px; border-radius:var(--radius-sm);
  border:none; font-size:14px; font-weight:700;
  cursor:pointer; font-family:inherit; transition:all .2s;
}
.timer-btn.primary {
  background:var(--accent-grad); color:#fff; flex:1;
  box-shadow:0 4px 16px var(--accent-glow);
}
.timer-btn.primary:active { box-shadow:0 2px 8px var(--accent-glow); transform:scale(.96); }
.timer-btn.secondary {
  background:var(--glass); color:var(--text2);
  border:1px solid var(--glass-border);
}
.timer-btn:active { transform:scale(.95); }

/* ── STATS ── */
.stat-card {
  background:var(--glass); backdrop-filter:blur(16px) saturate(1.2);
  border-radius:var(--radius); padding:20px; margin-bottom:14px;
  border:1px solid var(--glass-border);
  box-shadow:0 4px 24px rgba(0,0,0,.2), inset 0 1px 0 rgba(255,255,255,.03);
}
.stat-card h3 {
  font-size:11px; color:var(--text3); text-transform:uppercase;
  letter-spacing:1px; margin-bottom:10px; font-weight:700;
}
.stat-value {
  font-size:34px; font-weight:800; letter-spacing:-1px;
  background:var(--accent-grad); -webkit-background-clip:text;
  -webkit-text-fill-color:transparent; background-clip:text;
}
.stat-sub { font-size:13px; color:var(--text2); margin-top:4px; }
.stat-row { display:flex; gap:12px; margin-bottom:14px; }
.stat-row .stat-card { flex:1; }

.chart-container {
  background:var(--glass); backdrop-filter:blur(16px) saturate(1.2);
  border-radius:var(--radius); padding:20px; margin-bottom:14px;
  border:1px solid var(--glass-border);
  box-shadow:0 4px 24px rgba(0,0,0,.2), inset 0 1px 0 rgba(255,255,255,.03);
}
.chart-container h3 {
  font-size:14px; font-weight:700; margin-bottom:14px;
}
.chart-canvas {
  width:100%; height:200px; display:block;
}

/* ── VOLUME BADGE ── */
.vol-badge {
  display:inline-block; padding:4px 12px;
  border-radius:14px; font-size:12px; font-weight:700;
}
.vol-badge.up {
  background:var(--green-dim); color:var(--green);
  box-shadow:0 0 8px rgba(52,211,153,.15);
}
.vol-badge.down {
  background:var(--red-dim); color:var(--red);
  box-shadow:0 0 8px rgba(248,113,113,.15);
}
.vol-badge.same { background:var(--surface3); color:var(--text3); }

/* ── HISTORY ── */
.history-item {
  background:var(--glass); backdrop-filter:blur(16px) saturate(1.2);
  border-radius:var(--radius); padding:18px; margin-bottom:12px;
  border:1px solid var(--glass-border);
  box-shadow:0 4px 24px rgba(0,0,0,.2), inset 0 1px 0 rgba(255,255,255,.03);
  transition:all .2s;
}
.history-date { font-size:13px; color:var(--text3); margin-bottom:6px; font-weight:600; }
.history-exercises { font-size:14px; color:var(--text2); }
.history-vol {
  font-size:14px; margin-top:8px; font-weight:700;
  background:var(--accent-grad); -webkit-background-clip:text;
  -webkit-text-fill-color:transparent; background-clip:text;
}

/* ── EMPTY STATE ── */
.empty-state { text-align:center; padding:56px 20px; color:var(--text3); }
.empty-state .icon { font-size:60px; margin-bottom:16px; filter:grayscale(.3); }
.empty-state p { font-size:16px; line-height:1.7; }

/* ── MODAL ── */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.75);
  z-index:200; display:flex; align-items:flex-end; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity .25s;
  backdrop-filter:blur(8px);
}
.modal-overlay.show { opacity:1; pointer-events:auto; }
.modal {
  background:var(--surface-solid);
  border-radius:var(--radius) var(--radius) 0 0;
  width:100%; max-width:500px; max-height:85vh;
  padding:24px 16px calc(24px + var(--safe-bot));
  overflow-y:auto; transform:translateY(100%);
  transition:transform .3s cubic-bezier(.16,1,.3,1);
  border-top:2px solid; border-image:var(--accent-grad) 1;
  box-shadow:0 -16px 48px rgba(0,0,0,.4);
}
.modal-overlay.show .modal { transform:translateY(0); }
.modal h2 { font-size:20px; font-weight:800; margin-bottom:16px; }
.modal-close {
  float:right; background:var(--surface2); border:1px solid var(--glass-border);
  color:var(--text2); width:36px; height:36px; border-radius:50%;
  font-size:18px; cursor:pointer; font-family:inherit;
  transition:all .2s;
}
.modal-close:active { background:var(--surface3); }

.exercise-pick {
  padding:14px 16px; border-radius:var(--radius-sm);
  background:var(--glass); margin-bottom:8px;
  border:1px solid var(--glass-border);
  cursor:pointer; font-size:15px; font-weight:600;
  transition:all .2s; display:flex; justify-content:space-between; align-items:center;
}
.exercise-pick:active {
  background:var(--accent-dim); border-color:var(--accent);
  box-shadow:0 0 12px var(--accent-glow);
}
.exercise-pick .muscle {
  font-size:11px; color:var(--accent2); background:var(--accent-dim);
  padding:3px 10px; border-radius:10px; font-weight:600;
  border:1px solid rgba(99,102,241,.1);
}

.muscle-filter {
  display:flex; gap:6px; margin-bottom:14px; overflow-x:auto;
  padding-bottom:4px; -webkit-overflow-scrolling:touch;
}
.muscle-filter-btn {
  padding:7px 14px; border-radius:18px; border:1px solid var(--glass-border);
  background:var(--glass); color:var(--text3); font-size:12px;
  font-weight:600; cursor:pointer; font-family:inherit;
  white-space:nowrap; transition:all .2s;
}
.muscle-filter-btn.active {
  background:var(--accent-grad); color:#fff; border-color:transparent;
  box-shadow:0 2px 12px var(--accent-glow);
}

.form-input {
  width:100%; padding:14px 16px; border-radius:var(--radius-sm);
  border:1px solid var(--glass-border); background:rgba(15,23,42,.6);
  color:var(--text); font-size:16px; font-family:inherit;
  outline:none; font-weight:500; transition:all .2s;
}
.form-input:focus {
  border-color:var(--accent);
  box-shadow:0 0 16px var(--accent-glow);
  background:rgba(15,23,42,.9);
}

/* ── BENCHMARK ── */
.bench-table { width:100%; border-collapse:collapse; margin-top:12px; }
.bench-table th {
  font-size:10px; color:var(--text3); text-transform:uppercase;
  letter-spacing:.8px; padding:8px 4px; text-align:center;
  border-bottom:1px solid var(--glass-border); font-weight:700;
}
.bench-table td {
  padding:10px 4px; text-align:center; font-size:14px;
  border-bottom:1px solid rgba(148,163,184,.06); font-weight:600;
}

// Epley formula: 1RM = weight × (1 + reps/30)
function estimate1RM(kg, reps) {
  kg = parseFloat(kg) || 0;
  reps = parseInt(reps) || 0;
  if (kg <= 0 || reps <= 0) return 0;
  if (reps === 1) return kg;
  return Math.round(kg * (1 + reps / 30) * 10) / 10;
}

function getStrengthLevel(rm, benchData) {
  if (rm >= benchData.world) return {level:'Mondiale', cls:'world', pct:100};
  if (rm >= benchData.elite) return {level:'Elite', cls:'elite', pct: 80 + 20*(rm-benchData.elite)/(benchData.world-benchData.elite)};
  if (rm >= benchData.adv) return {level:'Avanzato', cls:'advanced', pct: 60 + 20*(rm-benchData.adv)/(benchData.elite-benchData.adv)};
  if (rm >= benchData.int) return {level:'Intermedio', cls:'intermediate', pct: 40 + 20*(rm-benchData.int)/(benchData.adv-benchData.int)};
  if (rm >= benchData.beg) return {level:'Principiante', cls:'beginner', pct: 20 + 20*(rm-benchData.beg)/(benchData.int-benchData.beg)};
  return {level:'Novizio', cls:'beginner', pct: Math.max(5, 20*rm/benchData.beg)};
}

function getBest1RM(exName) {
  const profile = getProfileData();
  let best = 0;
  Object.values(profile.workouts).forEach(w => {
    if (!w.exercises) return;
    const ex = w.exercises.find(e => e.name === exName);
    if (!ex) return;
    ex.sets.filter(s => !s.warmup && s.kg && s.reps).forEach(s => {
      const rm = estimate1RM(s.kg, s.reps);
      if (rm > best) best = rm;
    });
  });
  return best;
}

function getWeekId(offset) {
  const d = new Date(); d.setDate(d.getDate() + offset * 7);
  const yr = d.getFullYear();
  const jan4 = new Date(yr, 0, 4);
  const oneDay = 86400000;
  const dayOfYear = Math.round((d - new Date(yr, 0, 1)) / oneDay) + 1;
  const wk = Math.ceil((dayOfYear + jan4.getDay() - 1) / 7);
  return `${yr}-W${String(wk).padStart(2,'0')}`;
}

function getWeekDates(offset) {
  const d = new Date(); d.setDate(d.getDate() + offset * 7);
  const day = d.getDay();
  const mon = new Date(d); mon.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  return Array.from({length:7}, (_, i) => { const dd = new Date(mon); dd.setDate(mon.getDate()+i); return dd; });
}

function formatDate(d) { return d.toISOString().split('T')[0]; }
function formatDateShort(d) { return d.toLocaleDateString('it-IT',{day:'numeric',month:'short'}); }

function getWeekLabel(offset) {
  const dates = getWeekDates(offset);
  const f = formatDateShort(dates[0]), t = formatDateShort(dates[6]);
  if (offset === 0) return `Questa settimana`;
  if (offset === -1) return `Sett. scorsa`;
  return `${f} — ${t}`;
}

function getWorkoutKey(wo, di) { return `${getWeekId(wo)}-${di}`; }

// ═══════════════════════════════════════════
//  PROFILE & TAB SWITCH
// ═══════════════════════════════════════════
function switchProfile(p) {
  currentProfile = p;
  document.querySelectorAll('.profile-btn').forEach(b => b.classList.toggle('active', b.dataset.profile === p));
  render();
}
function switchTab(t) {
  currentTab = t;
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.tab === t));
  render();
}

// ═══════════════════════════════════════════
//  RENDER DISPATCHER
// ═══════════════════════════════════════════
function render() {
  const main = document.getElementById('mainContent');
  if (currentTab === 'workout') main.innerHTML = renderWorkout();
  else if (currentTab === 'stats') { main.innerHTML = renderStats(); drawCharts(); }
  else if (currentTab === 'history') main.innerHTML = renderHistory();
}

// ── WORKOUT VIEW ──
function renderWorkout() {
  const profile = getProfileData();
  const key = getWorkoutKey(currentWeekOffset, currentDayIndex);
  const workout = profile.workouts[key] || {exercises:[], date:formatDate(new Date())};

  let html = `
    <div class="week-nav">
      <button onclick="changeWeek(-1)">&#8249;</button>
      <span class="week-label">${getWeekLabel(currentWeekOffset)}</span>
      <button onclick="changeWeek(1)">&#8250;</button>
    </div>
    <div class="day-selector">
      ${DAYS_LABELS.map((label, i) => {
        const k = getWorkoutKey(currentWeekOffset, i);
        const w = profile.workouts[k];
        const count = w ? w.exercises.length : 0;
        return `<button class="day-btn ${i===currentDayIndex?'active':''}" onclick="selectDay(${i})">
          ${label}<span class="day-label">${count ? count+' es.' : '—'}</span>
        </button>`;
      }).join('')}
    </div>`;

  if (!workout.exercises.length) {
    html += `<div class="empty-state"><div class="icon">&#127947;</div><p>Nessun esercizio.<br>Aggiungi il primo!</p></div>`;
  } else {
    workout.exercises.forEach((ex, ei) => {
      html += renderExerciseCard(ex, ei);
    });
  }

  html += `<button class="add-exercise-btn" onclick="openExercisePicker()">+ Aggiungi Esercizio</button>`;
  html += `<button class="add-exercise-btn accent" onclick="showTimer()">&#9201; Timer Recupero</button>`;

  const vol = calcWorkoutVolume(workout);
  if (vol > 0) {
    const prevVol = getPrevWorkoutVolume(currentDayIndex);
    let badge = '';
    if (prevVol > 0) {
      const diff = ((vol - prevVol) / prevVol * 100).toFixed(0);
      badge = diff > 0 ? `<span class="vol-badge up">+${diff}%</span>` :
              diff < 0 ? `<span class="vol-badge down">${diff}%</span>` :
              `<span class="vol-badge same">=</span>`;
    }
    html += `<div style="text-align:center;color:var(--text2);font-size:14px;margin:16px 0;font-weight:600">
      Volume: <span style="color:var(--accent)">${vol.toLocaleString('it-IT')} kg</span> ${badge}
    </div>`;
  }
  return html;
}

function renderExerciseCard(ex, exIndex) {
  const prevData = getPreviousData(ex.name);
  const muscleInfo = EXERCISE_DB.find(e => e.name === ex.name);
  const muscleTag = muscleInfo ? `<span class="exercise-muscle">${muscleInfo.muscle}</span>` : '';

  let setsHtml = '';
  let workSetNum = 0;
  ex.sets.forEach((s, si) => {
    if (!s.warmup) workSetNum++;
    setsHtml += `
      <tr class="set-row ${s.warmup?'warmup':''}">
        <td><span class="set-num ${s.warmup?'warmup':''}">${s.warmup?'W':workSetNum}</span></td>
        <td><input class="set-input small" type="number" inputmode="decimal" step="0.5" value="${s.kg||''}" placeholder="—" onchange="updateSet(${exIndex},${si},'kg',this.value)"></td>
        <td><input class="set-input small" type="number" inputmode="numeric" value="${s.reps||''}" placeholder="—" onchange="updateSet(${exIndex},${si},'reps',this.value)"></td>
        <td><select class="rpe-select" onchange="updateSet(${exIndex},${si},'rpe',this.value)">
          <option value="">—</option>
          ${[6,6.5,7,7.5,8,8.5,9,9.5,10].map(v=>`<option value="${v}" ${s.rpe==v?'selected':''}>${v}</option>`).join('')}
        </select></td>
        <td><button class="icon-btn danger" onclick="removeSet(${exIndex},${si})" style="width:28px;height:28px;font-size:12px">&#10005;</button></td>
      </tr>`;
  });

  let prevHtml = '';
  if (prevData) {
    const ps = prevData.sets.filter(s => !s.warmup);
    prevHtml = `<div class="prev-data show"><strong>Sett. prec:</strong> ${ps.map(s=>`${s.kg||'?'}kg x${s.reps||'?'}`).join(' | ')}</div>`;
  }

  return `
    <div class="exercise-card">
      <div class="exercise-header">
        <div style="flex:1;display:flex;align-items:center">
          <input class="exercise-name" value="${ex.name}" onchange="renameExercise(${exIndex},this.value)">
          ${muscleTag}
        </div>
        <div class="exercise-actions">
          <button class="icon-btn" onclick="moveExercise(${exIndex},-1)">&#8593;</button>
          <button class="icon-btn" onclick="moveExercise(${exIndex},1)">&#8595;</button>
          <button class="icon-btn danger" onclick="removeExercise(${exIndex})">&#128465;</button>
        </div>
      </div>
      <table class="sets-table">
        <thead><tr><th>Set</th><th>Kg</th><th>Rip</th><th>RPE</th><th></th></tr></thead>
        <tbody>${setsHtml}</tbody>
      </table>
      <div class="add-set-row">
        <button class="add-set-btn" onclick="addSet(${exIndex},false)">+ Serie</button>
        <button class="add-set-btn" onclick="addSet(${exIndex},true)">+ Riscaldamento</button>
      </div>
      ${prevHtml}
    </div>`;
}

// ── STATS VIEW (con Canvas charts) ──
function renderStats() {
  const profile = getProfileData();
  const workouts = Object.values(profile.workouts).filter(w => w.exercises && w.exercises.length > 0);

  if (workouts.length === 0) {
    return `<div class="empty-state"><div class="icon">&#128200;</div><p>Allena qualche giorno<br>per vedere le statistiche</p></div>`;
  }

  const totalSessions = workouts.length;
  const thisWeekVol = [0,1,2].reduce((s,d) => { const w = profile.workouts[getWorkoutKey(0,d)]; return s + (w ? calcWorkoutVolume(w) : 0); }, 0);
  const lastWeekVol = [0,1,2].reduce((s,d) => { const w = profile.workouts[getWorkoutKey(-1,d)]; return s + (w ? calcWorkoutVolume(w) : 0); }, 0);

  let volTrend = '';
  if (lastWeekVol > 0 && thisWeekVol > 0) {
    const diff = ((thisWeekVol - lastWeekVol) / lastWeekVol * 100).toFixed(0);
    volTrend = diff > 0 ? `<span class="vol-badge up">+${diff}%</span>` : diff < 0 ? `<span class="vol-badge down">${diff}%</span>` : '';
  }

  // Exercise selector for line chart
  const allExNames = new Set();
  Object.values(profile.workouts).forEach(w => { if(w.exercises) w.exercises.forEach(e => allExNames.add(e.name)); });
  const exOptions = [...allExNames].map(n => `<option value="${n}">${n}</option>`).join('');

  return `
    <div class="stat-row">
      <div class="stat-card">
        <h3>Sessioni</h3>
        <div class="stat-value">${totalSessions}</div>
      </div>
      <div class="stat-card">
        <h3>Volume sett.</h3>
        <div class="stat-value">${thisWeekVol > 0 ? (thisWeekVol/1000).toFixed(1)+'t' : '—'}</div>
        <div class="stat-sub">${volTrend}</div>
      </div>
    </div>

    <div class="chart-container">
      <h3>Volume settimanale (8 settimane)</h3>
      <canvas class="chart-canvas" id="chartWeeklyVol"></canvas>
    </div>

    <div class="chart-container">
      <h3>Volume per gruppo muscolare</h3>
      <canvas class="chart-canvas" id="chartMuscleVol"></canvas>
    </div>

    <div class="chart-container">
      <h3>Progressione carico
        <select id="chartExSelect" onchange="drawProgressionChart()" style="float:right;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:13px;font-family:inherit;outline:none">
          ${exOptions}
        </select>
      </h3>
      <canvas class="chart-canvas" id="chartProgression" style="height:220px"></canvas>
    </div>

    <div class="chart-container">
      <h3>RPE medio per sessione</h3>
      <canvas class="chart-canvas" id="chartRPE" style="height:180px"></canvas>
    </div>

    ${renderBenchmarks()}
  `;
}

function renderBenchmarks() {
  const prof = getProfiles()[currentProfile];
  const benchmarks = getBenchmarks();
  const levelNames = ['Principiante','Intermedio','Avanzato','Elite','Mondiale'];

  // Profile card
  let html = `
    <div class="bench-profile-card">
      <div class="bench-profile-info">
        <div class="bench-profile-stat"><div class="val">${prof.age}</div><div class="label">Anni</div></div>
        <div class="bench-profile-stat"><div class="val">${prof.height}</div><div class="label">cm</div></div>
        <div class="bench-profile-stat"><div class="val">${prof.weight}</div><div class="label">kg</div></div>
        <div class="bench-profile-stat"><div class="val">${prof.sex}</div><div class="label">Sesso</div></div>
      </div>
      <button class="bench-edit-btn" onclick="editProfile()">Modifica</button>
    </div>
  `;

  // Strength Score (media pct di tutti gli esercizi con benchmark)
  let totalPct = 0, counted = 0;
  const rows = [];
  Object.entries(benchmarks).forEach(([exName, std]) => {
    const rm = getBest1RM(exName);
    const info = getStrengthLevel(rm, std);
    if (rm > 0) { totalPct += info.pct; counted++; }
    rows.push({exName, rm, info, std});
  });

  const avgScore = counted > 0 ? Math.round(totalPct / counted) : 0;
  const scoreLevel = avgScore >= 80 ? {label:'Elite',cls:'elite'} :
                     avgScore >= 60 ? {label:'Avanzato',cls:'advanced'} :
                     avgScore >= 40 ? {label:'Intermedio',cls:'intermediate'} :
                     avgScore >= 20 ? {label:'Principiante',cls:'beginner'} :
                     {label:'Novizio',cls:'beginner'};

  const scoreColor = avgScore >= 80 ? 'var(--purple)' :
                     avgScore >= 60 ? 'var(--green)' :
                     avgScore >= 40 ? 'var(--accent)' :
                     'var(--text2)';

  html += `
    <div class="bench-strength-score">
      <div class="score" style="color:${scoreColor}">${avgScore}</div>
      <div class="label">Strength Score — <span class="bench-level ${scoreLevel.cls}">${scoreLevel.label}</span></div>
    </div>
  `;

  // Table
  html += `
    <div class="chart-container">
      <h3>Benchmark Mondiali vs Tuo 1RM</h3>
      <table class="bench-table">
        <thead><tr>
          <th style="text-align:left">Esercizio</th>
          <th>Tuo 1RM</th>
          <th>Livello</th>
          <th>Princ.</th>
          <th>Inter.</th>
          <th>Avanz.</th>
          <th>Elite</th>
        </tr></thead>
        <tbody>
  `;

  rows.forEach(({exName, rm, info, std}) => {
    const shortName = exName.replace('Bilanciere','Bil.').replace('Manubri','Man.').replace(' Avanti','');
    html += `
      <tr>
        <td>${shortName}</td>
        <td><span class="bench-your-rm">${rm > 0 ? rm+'kg' : '—'}</span></td>
        <td><span class="bench-level ${info.cls}">${rm > 0 ? info.level : '—'}</span></td>
        <td style="color:var(--text3)">${std.beg}</td>
        <td style="color:var(--accent2)">${std.int}</td>
        <td style="color:var(--green)">${std.adv}</td>
        <td style="color:var(--purple)">${std.elite}</td>
      </tr>
      <tr><td colspan="7" style="padding:0 0 10px 0">
        <div class="bench-bar-track">
          <div class="bench-bar-segments">
            <div class="bench-bar-seg" style="width:20%;background:var(--text3)"></div>
            <div class="bench-bar-seg" style="width:20%;background:var(--accent)"></div>
            <div class="bench-bar-seg" style="width:20%;background:var(--green)"></div>
            <div class="bench-bar-seg" style="width:20%;background:var(--purple)"></div>
            <div class="bench-bar-seg" style="width:20%;background:var(--orange)"></div>
          </div>
          <div class="bench-bar-fill" style="width:${Math.min(100, info.pct).toFixed(0)}%;background:${
            info.cls==='world'?'var(--orange)':
            info.cls==='elite'?'var(--purple)':
            info.cls==='advanced'?'var(--green)':
            info.cls==='intermediate'?'var(--accent)':'var(--text3)'
          };position:relative;z-index:1"></div>
        </div>
      </td></tr>
    `;
  });

  html += `</tbody></table>
    <div style="margin-top:12px;font-size:11px;color:var(--text3)">
      1RM stimato con formula Epley. Standard per ${prof.sex==='M'?'uomo':'donna'} ~${prof.weight}kg.
      Fonti: Symmetric Strength, ExRx, IPF.
    </div>
  </div>`;

  return html;
}

function editProfile() {
  const profs = getProfiles();
  const p = profs[currentProfile];
  const age = prompt('Età:', p.age);
  if (age === null) return;
  const height = prompt('Altezza (cm):', p.height);
  if (height === null) return;
  const weight = prompt('Peso (kg):', p.weight);
  if (weight === null) return;
  const sex = prompt('Sesso (M/F):', p.sex);
  if (sex === null) return;
  profs[currentProfile] = {
    age: parseInt(age)||p.age,
    height: parseInt(height)||p.height,
    weight: parseFloat(weight)||p.weight,
    sex: (sex.toUpperCase()==='F'?'F':'M')
  };
  saveProfiles(profs);
  render();
}

// ── CANVAS CHARTS ──
function drawCharts() {
  drawWeeklyVolumeChart();
  drawMuscleVolumeChart();
  drawProgressionChart();
  drawRPEChart();
}

function setupCanvas(id) {
  const c = document.getElementById(id);
  if (!c) return null;
  const dpr = window.devicePixelRatio || 1;
  const rect = c.getBoundingClientRect();
  c.width = rect.width * dpr;
  c.height = rect.height * dpr;
  const ctx = c.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.width = rect.width;
  ctx.height = rect.height;
  return ctx;
}

function drawWeeklyVolumeChart() {
  const ctx = setupCanvas('chartWeeklyVol');
  if (!ctx) return;
  const profile = getProfileData();
  const W = ctx.width, H = ctx.height;
  const pad = {t:20,r:16,b:30,l:50};

  const data = [];
  for (let wo = -7; wo <= 0; wo++) {
    let v = 0;
    for (let d = 0; d < 3; d++) { const w = profile.workouts[getWorkoutKey(wo,d)]; if(w) v += calcWorkoutVolume(w); }
    data.push({label: getWeekId(wo).split('-')[1], vol: v});
  }
  const maxV = Math.max(...data.map(d=>d.vol), 1);

  // Grid
  ctx.strokeStyle = '#27272a'; ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + (H - pad.t - pad.b) * (1 - i/4);
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W-pad.r, y); ctx.stroke();
    ctx.fillStyle = '#52525b'; ctx.font = '11px Inter'; ctx.textAlign = 'right';
    ctx.fillText((maxV*i/4/1000).toFixed(1)+'t', pad.l-6, y+4);
  }

  // Bars
  const bw = (W - pad.l - pad.r) / data.length;
  data.forEach((d, i) => {
    const x = pad.l + i * bw + bw*0.15;
    const w = bw * 0.7;
    const h = d.vol > 0 ? (d.vol / maxV) * (H - pad.t - pad.b) : 0;
    const y = H - pad.b - h;

    // Gradient bar
    const grad = ctx.createLinearGradient(0, y, 0, H-pad.b);
    grad.addColorStop(0, '#3b82f6');
    grad.addColorStop(1, '#1d4ed8');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, [4,4,0,0]);
    ctx.fill();

    // Glow
    if (i === data.length - 1 && d.vol > 0) {
      ctx.shadowColor = '#3b82f6'; ctx.shadowBlur = 12;
      ctx.fill(); ctx.shadowBlur = 0;
    }

    // Label
    ctx.fillStyle = '#a1a1aa'; ctx.font = '11px Inter'; ctx.textAlign = 'center';
    ctx.fillText(d.label, x + w/2, H - pad.b + 16);
  });
}

function drawMuscleVolumeChart() {
  const ctx = setupCanvas('chartMuscleVol');
  if (!ctx) return;
  const profile = getProfileData();
  const W = ctx.width, H = ctx.height;
  const pad = {t:16,r:16,b:12,l:90};

  const muscleVol = {};
  for (let wo = 0; wo >= -3; wo--) {
    for (let d = 0; d < 3; d++) {
      const w = profile.workouts[getWorkoutKey(wo,d)];
      if (!w) continue;
      w.exercises.forEach(ex => {
        const info = EXERCISE_DB.find(e => e.name === ex.name);
        const muscle = info ? info.muscle : 'Altro';
        if (!muscleVol[muscle]) muscleVol[muscle] = 0;
        ex.sets.filter(s => !s.warmup).forEach(s => {
          muscleVol[muscle] += (parseFloat(s.kg)||0) * (parseInt(s.reps)||0);
        });
      });
    }
  }

  const sorted = Object.entries(muscleVol).sort((a,b) => b[1]-a[1]);
  if (!sorted.length) return;
  const maxV = sorted[0][1];
  const barH = Math.min(22, (H - pad.t - pad.b) / sorted.length - 4);
  const colors = ['#3b82f6','#22c55e','#f59e0b','#a855f7','#06b6d4','#ef4444','#ec4899','#f97316','#14b8a6','#8b5cf6'];

  sorted.forEach(([muscle, vol], i) => {
    const y = pad.t + i * (barH + 6);
    const w = (vol / maxV) * (W - pad.l - pad.r - 50);

    ctx.fillStyle = '#a1a1aa'; ctx.font = '12px Inter'; ctx.textAlign = 'right';
    ctx.fillText(muscle, pad.l - 8, y + barH/2 + 4);

    const grad = ctx.createLinearGradient(pad.l, 0, pad.l + w, 0);
    grad.addColorStop(0, colors[i % colors.length]);
    grad.addColorStop(1, colors[i % colors.length] + '88');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.roundRect(pad.l, y, w, barH, 4); ctx.fill();

    ctx.fillStyle = '#fafafa'; ctx.font = '11px Inter'; ctx.textAlign = 'left';
    ctx.fillText((vol/1000).toFixed(1)+'t', pad.l + w + 6, y + barH/2 + 4);
  });
}

function drawProgressionChart() {
  const ctx = setupCanvas('chartProgression');
  if (!ctx) return;
  const profile = getProfileData();
  const W = ctx.width, H = ctx.height;
  const pad = {t:20,r:16,b:30,l:50};

  const sel = document.getElementById('chartExSelect');
  if (!sel) return;
  const exName = sel.value;

  // Collect data points (last 8 weeks)
  const points = [];
  for (let wo = -7; wo <= 0; wo++) {
    for (let d = 0; d < 3; d++) {
      const w = profile.workouts[getWorkoutKey(wo,d)];
      if (!w) continue;
      const ex = w.exercises.find(e => e.name === exName);
      if (!ex) continue;
      const workSets = ex.sets.filter(s => !s.warmup && s.kg);
      if (!workSets.length) continue;
      const maxKg = Math.max(...workSets.map(s => parseFloat(s.kg)||0));
      const totalVol = workSets.reduce((s,set) => s + (parseFloat(set.kg)||0)*(parseInt(set.reps)||0), 0);
      points.push({week: getWeekId(wo), maxKg, totalVol, label: getWeekId(wo).split('-')[1]});
    }
  }

  if (points.length < 2) {
    ctx.fillStyle = '#52525b'; ctx.font = '14px Inter'; ctx.textAlign = 'center';
    ctx.fillText('Servono almeno 2 sessioni', W/2, H/2);
    return;
  }

  const maxKg = Math.max(...points.map(p=>p.maxKg), 1);
  const minKg = Math.min(...points.map(p=>p.maxKg)) * 0.9;
  const range = maxKg - minKg || 1;

  // Grid
  ctx.strokeStyle = '#27272a'; ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + (H-pad.t-pad.b)*(1-i/4);
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    ctx.fillStyle = '#52525b'; ctx.font = '11px Inter'; ctx.textAlign = 'right';
    ctx.fillText((minKg + range*i/4).toFixed(1), pad.l-6, y+4);
  }

  // Line
  const stepX = (W-pad.l-pad.r) / (points.length-1);
  ctx.beginPath();
  ctx.strokeStyle = '#22c55e'; ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round';
  points.forEach((p, i) => {
    const x = pad.l + i*stepX;
    const y = pad.t + (1-(p.maxKg-minKg)/range)*(H-pad.t-pad.b);
    if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.stroke();

  // Area fill
  const lastX = pad.l + (points.length-1)*stepX;
  ctx.lineTo(lastX, H-pad.b);
  ctx.lineTo(pad.l, H-pad.b);
  ctx.closePath();
  const areaGrad = ctx.createLinearGradient(0,pad.t,0,H-pad.b);
  areaGrad.addColorStop(0, 'rgba(34,197,94,.2)');
  areaGrad.addColorStop(1, 'rgba(34,197,94,0)');
  ctx.fillStyle = areaGrad;
  ctx.fill();

  // Points
  points.forEach((p, i) => {
    const x = pad.l + i*stepX;
    const y = pad.t + (1-(p.maxKg-minKg)/range)*(H-pad.t-pad.b);

    ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2);
    ctx.fillStyle = '#22c55e'; ctx.fill();
    ctx.strokeStyle = '#09090b'; ctx.lineWidth = 2; ctx.stroke();

    // Value on top
    ctx.fillStyle = '#fafafa'; ctx.font = 'bold 11px Inter'; ctx.textAlign = 'center';
    ctx.fillText(p.maxKg+'kg', x, y-10);

    // Label bottom
    ctx.fillStyle = '#a1a1aa'; ctx.font = '10px Inter';
    ctx.fillText(p.label, x, H-pad.b+14);
  });
}

function drawRPEChart() {
  const ctx = setupCanvas('chartRPE');
  if (!ctx) return;
  const profile = getProfileData();
  const W = ctx.width, H = ctx.height;
  const pad = {t:16,r:16,b:28,l:40};

  const points = [];
  for (let wo = -7; wo <= 0; wo++) {
    for (let d = 0; d < 3; d++) {
      const w = profile.workouts[getWorkoutKey(wo,d)];
      if (!w || !w.exercises) continue;
      const rpes = [];
      w.exercises.forEach(ex => ex.sets.forEach(s => { if(s.rpe) rpes.push(parseFloat(s.rpe)); }));
      if (!rpes.length) continue;
      const avg = rpes.reduce((a,b)=>a+b,0)/rpes.length;
      points.push({label: getWeekId(wo).split('-')[1]+'.'+d, avg});
    }
  }

  if (points.length < 2) {
    ctx.fillStyle = '#52525b'; ctx.font = '14px Inter'; ctx.textAlign = 'center';
    ctx.fillText('Servono dati RPE', W/2, H/2);
    return;
  }

  const maxR = 10, minR = 5;
  ctx.strokeStyle = '#27272a'; ctx.lineWidth = 1;
  for (let i = 0; i <= 5; i++) {
    const y = pad.t + (H-pad.t-pad.b)*(1-i/5);
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    ctx.fillStyle='#52525b'; ctx.font='11px Inter'; ctx.textAlign='right';
    ctx.fillText((minR+i).toFixed(0), pad.l-6, y+4);
  }

  const stepX = (W-pad.l-pad.r)/(points.length-1);

  // Line
  ctx.beginPath(); ctx.strokeStyle='#f59e0b'; ctx.lineWidth=2.5;
  points.forEach((p,i) => {
    const x = pad.l+i*stepX;
    const y = pad.t + (1-(p.avg-minR)/(maxR-minR))*(H-pad.t-pad.b);
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.stroke();

  // Area
  ctx.lineTo(pad.l+(points.length-1)*stepX, H-pad.b);
  ctx.lineTo(pad.l, H-pad.b); ctx.closePath();
  const g = ctx.createLinearGradient(0,pad.t,0,H-pad.b);
  g.addColorStop(0,'rgba(245,158,11,.15)'); g.addColorStop(1,'rgba(245,158,11,0)');
  ctx.fillStyle=g; ctx.fill();

  // Dots
  points.forEach((p,i) => {
    const x = pad.l+i*stepX;
    const y = pad.t + (1-(p.avg-minR)/(maxR-minR))*(H-pad.t-pad.b);
    ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2);
    ctx.fillStyle='#f59e0b'; ctx.fill();
    ctx.fillStyle='#fafafa'; ctx.font='bold 10px Inter'; ctx.textAlign='center';
    ctx.fillText(p.avg.toFixed(1), x, y-8);
  });
}

// ── HISTORY VIEW ──
function renderHistory() {
  const profile = getProfileData();
  const keys = Object.keys(profile.workouts).sort().reverse();
  if (!keys.length) return `<div class="empty-state"><div class="icon">&#128203;</div><p>Nessun allenamento registrato</p></div>`;
  return keys.map(k => {
    const w = profile.workouts[k];
    if (!w.exercises || !w.exercises.length) return '';
    const vol = calcWorkoutVolume(w);
    const parts = k.split('-');
    const dayLabel = DAYS_LABELS[parseInt(parts[2])] || '';
    return `<div class="history-item">
      <div class="history-date">${parts[0]}-${parts[1]} — ${dayLabel} ${w.date?'('+w.date+')':''}</div>
      <div class="history-exercises">${w.exercises.map(e=>'<strong>'+e.name+'</strong>').join(', ')}</div>
      <div class="history-vol">Volume: ${vol>0?vol.toLocaleString('it-IT')+' kg':'—'}</div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════
//  WORKOUT OPERATIONS
// ═══════════════════════════════════════════
function changeWeek(dir) { currentWeekOffset += dir; render(); }
function selectDay(i) { currentDayIndex = i; render(); }

function getCurrentWorkout() {
  const data = getData();
  const key = getWorkoutKey(currentWeekOffset, currentDayIndex);
  if (!data[currentProfile].workouts[key]) {
    data[currentProfile].workouts[key] = {exercises:[], date:formatDate(new Date())};
  }
  return {data, key, workout: data[currentProfile].workouts[key]};
}

function addExercise(name) {
  const {data, workout} = getCurrentWorkout();
  workout.exercises.push({name, sets:[{kg:'',reps:'',rpe:'',warmup:false}]});
  if (!data[currentProfile].exerciseLibrary) data[currentProfile].exerciseLibrary = [];
  if (!data[currentProfile].exerciseLibrary.includes(name)) data[currentProfile].exerciseLibrary.push(name);
  workout.date = formatDate(new Date());
  saveData(data); closeModal('exerciseModal'); render();
}

function removeExercise(ei) {
  const {data, workout} = getCurrentWorkout();
  workout.exercises.splice(ei,1); saveData(data); render();
}

function renameExercise(ei, v) {
  const {data, workout} = getCurrentWorkout();
  workout.exercises[ei].name = v; saveData(data);
}

function moveExercise(ei, dir) {
  const {data, workout} = getCurrentWorkout();
  const ni = ei+dir;
  if (ni<0||ni>=workout.exercises.length) return;
  [workout.exercises[ei], workout.exercises[ni]] = [workout.exercises[ni], workout.exercises[ei]];
  saveData(data); render();
}

function addSet(ei, warmup) {
  const {data, workout} = getCurrentWorkout();
  const ex = workout.exercises[ei];
  const last = ex.sets.filter(s=>s.warmup===warmup).slice(-1)[0] || ex.sets.slice(-1)[0];
  ex.sets.push({kg:warmup?'':(last?.kg||''), reps:warmup?'':(last?.reps||''), rpe:'', warmup});
  saveData(data); render();
}

function removeSet(ei, si) {
  const {data, workout} = getCurrentWorkout();
  workout.exercises[ei].sets.splice(si,1); saveData(data); render();
}

function updateSet(ei, si, field, value) {
  const {data, workout} = getCurrentWorkout();
  workout.exercises[ei].sets[si][field] = value; saveData(data);
}

// ═══════════════════════════════════════════
//  EXERCISE PICKER
// ═══════════════════════════════════════════
function openExercisePicker() {
  currentMuscleFilter = 'Tutti';
  document.getElementById('exerciseSearch').value = '';
  renderMuscleFilter();
  filterExercises();
  document.getElementById('exerciseModal').classList.add('show');
  setTimeout(() => document.getElementById('exerciseSearch').focus(), 300);
}

function renderMuscleFilter() {
  document.getElementById('muscleFilter').innerHTML = MUSCLE_GROUPS.map(m =>
    `<button class="muscle-filter-btn ${m===currentMuscleFilter?'active':''}" onclick="setMuscleFilter('${m}')">${m}</button>`
  ).join('');
}

function setMuscleFilter(m) {
  currentMuscleFilter = m;
  renderMuscleFilter();
  filterExercises();
}

function filterExercises() {
  const q = (document.getElementById('exerciseSearch').value || '').toLowerCase();
  const list = document.getElementById('exerciseList');
  const profile = getProfileData();
  const library = profile.exerciseLibrary || [];

  let all = [...EXERCISE_DB];
  library.forEach(name => { if (!all.find(e=>e.name===name)) all.push({name, muscle:'Custom', cat:'Custom'}); });

  // Sort recently used first
  const recent = getRecentExercises();
  all.sort((a,b) => {
    const ai = recent.indexOf(a.name), bi = recent.indexOf(b.name);
    if (ai>=0&&bi>=0) return ai-bi;
    if (ai>=0) return -1; if (bi>=0) return 1; return 0;
  });

  if (currentMuscleFilter !== 'Tutti') all = all.filter(e => e.muscle === currentMuscleFilter);
  if (q) all = all.filter(e => e.name.toLowerCase().includes(q) || e.muscle.toLowerCase().includes(q));

  list.innerHTML = all.slice(0,20).map(e =>
    `<div class="exercise-pick" onclick="addExercise('${e.name.replace(/'/g,"\\'")}')">
      <span>${e.name}</span><span class="muscle">${e.muscle}</span>
    </div>`
  ).join('');
}

function addCustomExercise() {
  const name = document.getElementById('exerciseSearch').value.trim();
  if (name) addExercise(name);
}

function getRecentExercises() {
  const profile = getProfileData(); const names = [];
  for (let wo=0;wo>=-1;wo--) for (let d=0;d<3;d++) {
    const w = profile.workouts[getWorkoutKey(wo,d)];
    if(w) w.exercises.forEach(e=>{ if(!names.includes(e.name)) names.push(e.name); });
  }
  return names;
}

function closeModal(id) { document.getElementById(id).classList.remove('show'); }
document.getElementById('exerciseModal').addEventListener('click', function(e) { if(e.target===this) closeModal('exerciseModal'); });

// ═══════════════════════════════════════════
//  VOLUME CALC
// ═══════════════════════════════════════════
function calcWorkoutVolume(w) {
  if (!w||!w.exercises) return 0;
  let v=0; w.exercises.forEach(ex=>ex.sets.filter(s=>!s.warmup).forEach(s=>{ v+=(parseFloat(s.kg)||0)*(parseInt(s.reps)||0); }));
  return v;
}
function getPrevWorkoutVolume(di) {
  const w = getProfileData().workouts[getWorkoutKey(currentWeekOffset-1,di)];
  return w ? calcWorkoutVolume(w) : 0;
}
function getPreviousData(name) {
  const w = getProfileData().workouts[getWorkoutKey(currentWeekOffset-1,currentDayIndex)];
  return w ? w.exercises.find(e=>e.name===name) || null : null;
}

// ═══════════════════════════════════════════
//  TIMER
// ═══════════════════════════════════════════
function showTimer() { document.getElementById('timerBar').classList.add('show'); }
function hideTimer() { document.getElementById('timerBar').classList.remove('show'); stopTimer(); }

function setTimer(sec) {
  timerTarget=sec; timerSeconds=sec; timerRunning=false;
  clearInterval(timerInterval); updateTimerDisplay();
  document.getElementById('timerToggle').textContent='Avvia';
  document.querySelectorAll('.timer-preset').forEach(b => {
    const [m,s] = b.textContent.split(':').map(Number);
    b.classList.toggle('active', m*60+s===sec);
  });
}

function toggleTimer() { timerRunning ? stopTimer() : startTimer(); }

function startTimer() {
  timerRunning=true;
  document.getElementById('timerToggle').textContent='Pausa';
  timerInterval = setInterval(()=>{
    timerSeconds--;
    updateTimerDisplay();
    if(timerSeconds<=0) {
      stopTimer(); timerSeconds=0; updateTimerDisplay();
      if(navigator.vibrate) navigator.vibrate([200,100,200,100,200]);
      document.getElementById('timerDisplay').className='timer-display ready';
    }
  },1000);
}

function stopTimer() { timerRunning=false; clearInterval(timerInterval); document.getElementById('timerToggle').textContent='Avvia'; }
function resetTimer() { stopTimer(); timerSeconds=timerTarget; updateTimerDisplay(); }

function updateTimerDisplay() {
  const d = document.getElementById('timerDisplay');
  const m = Math.floor(Math.abs(timerSeconds)/60);
  const s = Math.abs(timerSeconds)%60;
  const sign = timerSeconds<0?'+':'';
  d.textContent = `${sign}${m}:${String(s).padStart(2,'0')}`;
  d.className = timerSeconds<=0 ? 'timer-display ready' : timerSeconds<=10 ? 'timer-display warning' : 'timer-display';
}

// ═══════════════════════════════════════════
//  DEMO DATA (2 settimane x 3 giorni x 2 profili)
// ═══════════════════════════════════════════
function loadDemoData() {
  if (localStorage.getItem('gym_demo_loaded') === '2m') return;

  // ═══ GENERATORE PROCEDURALE: 8 settimane x 3 giorni x 2 profili ═══

  // Helper: genera set con progressione + variazione naturale
  function genSets(baseKg, baseReps, numSets, week, progPerWeek, hasWarmup) {
    const sets = [];
    const kg = Math.round((baseKg + week * progPerWeek) * 2) / 2; // arrotonda a 0.5
    if (hasWarmup) {
      sets.push({kg:String(Math.round(kg*0.5)),reps:String(10),rpe:'',warmup:true});
      if (kg > 60) sets.push({kg:String(Math.round(kg*0.75)),reps:String(Math.min(8,baseReps)),rpe:'',warmup:true});
    }
    for (let i = 0; i < numSets; i++) {
      // Reps calano leggermente nelle ultime serie, RPE sale
      const fatigue = i * 0.7;
      const reps = Math.max(baseReps - Math.floor(fatigue + (Math.random()>.6?1:0)), baseReps - 3);
      const rpe = Math.min(10, 7 + i * 0.5 + (Math.random()>.5?0.5:0));
      sets.push({kg:String(kg), reps:String(reps), rpe:String(rpe), warmup:false});
    }
    return sets;
  }

  // ─── MATTIA: Push/Pull/Legs, 93kg, progressione realistica ───
  const mattiaPush = [
    {name:'Panca Piana Bilanciere', base:72.5, reps:8, sets:4, prog:1.25, warmup:true},
    {name:'Panca Inclinata Manubri', base:24, reps:10, sets:3, prog:1, warmup:false},
    {name:'Croci Cavi', base:12.5, reps:12, sets:3, prog:0.5, warmup:false},
    {name:'Military Press Bilanciere', base:42.5, reps:8, sets:3, prog:1, warmup:true},
    {name:'Alzate Laterali Manubri', base:8, reps:14, sets:3, prog:0.5, warmup:false},
    {name:'Push Down Corda', base:22.5, reps:12, sets:3, prog:0.5, warmup:false},
  ];
  const mattiaPull = [
    {name:'Stacco da Terra', base:110, reps:5, sets:3, prog:2.5, warmup:true},
    {name:'Rematore Bilanciere', base:55, reps:8, sets:3, prog:1.25, warmup:false},
    {name:'Lat Machine Avanti', base:50, reps:10, sets:3, prog:1, warmup:false},
    {name:'Face Pull', base:17.5, reps:15, sets:3, prog:0.5, warmup:false},
    {name:'Curl Bilanciere EZ', base:27.5, reps:10, sets:3, prog:0.5, warmup:false},
    {name:'Crunch ai Cavi', base:25, reps:15, sets:3, prog:1, warmup:false},
  ];
  const mattiaLegs = [
    {name:'Squat Bilanciere', base:80, reps:6, sets:4, prog:1.25, warmup:true},
    {name:'Leg Press', base:160, reps:10, sets:4, prog:5, warmup:false},
    {name:'Leg Curl Sdraiato', base:35, reps:12, sets:3, prog:1, warmup:false},
    {name:'Leg Extension', base:45, reps:12, sets:3, prog:1, warmup:false},
    {name:'Hip Thrust Bilanciere', base:70, reps:10, sets:3, prog:2.5, warmup:true},
    {name:'Calf Raise in Piedi', base:50, reps:15, sets:3, prog:1.25, warmup:false},
  ];

  // ─── MICHELLE: Lower/Upper/Full, 58kg ───
  const michLower = [
    {name:'Hip Thrust Bilanciere', base:50, reps:10, sets:4, prog:1.25, warmup:true},
    {name:'Squat Bilanciere', base:30, reps:8, sets:3, prog:1.25, warmup:true},
    {name:'Leg Press', base:80, reps:12, sets:3, prog:5, warmup:false},
    {name:'Leg Curl Seduto', base:20, reps:12, sets:3, prog:0.5, warmup:false},
    {name:'Abductor Machine', base:35, reps:15, sets:3, prog:1, warmup:false},
    {name:'Calf Raise Seduto', base:25, reps:15, sets:2, prog:1, warmup:false},
  ];
  const michUpper = [
    {name:'Lat Machine Avanti', base:25, reps:10, sets:3, prog:1, warmup:false},
    {name:'Pulley Basso', base:20, reps:12, sets:3, prog:0.5, warmup:false},
    {name:'Panca Piana Manubri', base:10, reps:10, sets:3, prog:0.5, warmup:false},
    {name:'Alzate Laterali Manubri', base:4, reps:15, sets:3, prog:0.25, warmup:false},
    {name:'Push Down Cavo', base:12.5, reps:12, sets:3, prog:0.5, warmup:false},
    {name:'Crunch Macchina', base:17.5, reps:15, sets:3, prog:0.5, warmup:false},
  ];
  const michFull = [
    {name:'Affondi Manubri', base:8, reps:12, sets:3, prog:0.5, warmup:false},
    {name:'Leg Extension', base:25, reps:12, sets:3, prog:1, warmup:false},
    {name:'Hip Thrust Bilanciere', base:50, reps:12, sets:3, prog:1.25, warmup:false},
    {name:'Lat Machine Avanti', base:25, reps:10, sets:2, prog:1, warmup:false},
    {name:'Plank', base:0, reps:40, sets:3, prog:0, warmup:false},
  ];

  const mattiaScheda = [mattiaPush, mattiaPull, mattiaLegs];
  const michScheda = [michLower, michUpper, michFull];

  function buildWorkouts(scheda, weeks) {
    const workouts = {};
    // Deload week ogni 4 settimane (settimana 4 e 8: -10% peso, -20% volume)
    for (let w = 0; w < weeks; w++) {
      const weekOffset = w - (weeks - 1); // da -(weeks-1) a 0
      const isDeload = (w+1) % 4 === 0;
      const deloadMult = isDeload ? 0.9 : 1;
      const deloadSets = isDeload ? -1 : 0;

      for (let d = 0; d < 3; d++) {
        const key = getWorkoutKey(weekOffset, d);
        const template = scheda[d];
        const exercises = template.map(ex => {
          const effectiveSets = Math.max(2, ex.sets + deloadSets);
          return {
            name: ex.name,
            sets: genSets(ex.base * deloadMult, ex.reps, effectiveSets, w, ex.prog, ex.warmup)
          };
        });
        // Calculate a plausible date
        const dateObj = new Date();
        dateObj.setDate(dateObj.getDate() + weekOffset * 7 + d * 2); // lun, mer, ven
        workouts[key] = { exercises, date: formatDate(dateObj) };
      }
    }
    return workouts;
  }

  const WEEKS = 8;
  const mattiaLib = [...new Set(mattiaScheda.flat().map(e=>e.name))];
  const michLib = [...new Set(michScheda.flat().map(e=>e.name))];

  const data = {
    mattia: {
      exerciseLibrary: mattiaLib,
      workouts: buildWorkouts(mattiaScheda, WEEKS)
    },
    michelle: {
      exerciseLibrary: michLib,
      workouts: buildWorkouts(michScheda, WEEKS)
    },
    _ts: Date.now()
  };

  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  localStorage.setItem('gym_demo_loaded', '2m');
}
